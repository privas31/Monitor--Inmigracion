// ── Componentes ──────────────────────────────────────────────────────────────
function Campo({campo, value, onChange}){
  const base = {width:"100%", padding:"10px 12px", borderRadius:8, border:"1px solid #D1D5DB", fontSize:14, outline:"none", fontFamily:"inherit"};
  if(campo.tipo==="select") return(
    <select value={value||""} onChange={e=>onChange(e.target.value)} style={{...base, background:"#fff", cursor:"pointer"}}>
      <option value="">Seleccionar...</option>
      {campo.opciones.map(o=><option key={o} value={o}>{o}</option>)}
    </select>
  );
  if(campo.tipo==="textarea") return(
    <textarea value={value||""} onChange={e=>onChange(e.target.value)} placeholder={campo.placeholder} rows={3}
      style={{...base, resize:"vertical"}}/>
  );
  return(
    <input type={campo.tipo} value={value||""} onChange={e=>onChange(e.target.value)}
      placeholder={campo.placeholder} style={base}/>
  );
}

function Formulario(){
  const [paso, setPaso] = useState("seleccion"); // seleccion | formulario | enviado
  const [tipoForm, setTipoForm] = useState(null);
  const [seccionActual, setSeccionActual] = useState(0);
  const [datos, setDatos] = useState({});
  const [enviando, setEnviando] = useState(false);
  const [error, setError] = useState("");

  const form = tipoForm ? FORMULARIOS[tipoForm] : null;
  const secciones = form?.secciones || [];
  const totalSecciones = secciones.length;

  const updateDato = (id, val) => setDatos(p=>({...p,[id]:val}));

  const seccionCompleta = () => {
    const sec = secciones[seccionActual];
    return sec.campos.filter(c=>c.req).every(c=>datos[c.id]&&datos[c.id].trim?.()!=="");
  };

  const handleEnviar = async () => {
    if(!seccionCompleta()){setError("Por favor complete los campos obligatorios (*)");return;}
    setEnviando(true);setError("");
    try{
      await window._addDoc(window._collection(window._db,"borradores"),{
        ...datos,
        tipoFormulario: tipoForm,
        labelFormulario: FORMULARIOS[tipoForm].label,
        estado: "borrador",
        fechaEnvio: new Date().toISOString(),
        fuente: "formulario_cliente",
      });
      setPaso("enviado");
    }catch(e){
      setError("Hubo un error al enviar. Por favor intente de nuevo.");
      console.error(e);
    }
    setEnviando(false);
  };

  // ── Pantalla de selección ──────────────────────────────────────────────────
  if(paso==="seleccion") return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0F172A 0%,#1E40AF 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{width:"100%",maxWidth:680}}>
        <div style={{textAlign:"center",marginBottom:32,color:"#fff"}}>
          <div style={{fontSize:48,marginBottom:12}}>⚖️</div>
          <h1 style={{fontSize:24,fontWeight:800,margin:0}}>Formulario de Intake</h1>
          <p style={{fontSize:14,opacity:0.75,marginTop:8}}>Seleccione el tipo de proceso que necesita</p>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:12}}>
          {Object.entries(FORMULARIOS).map(([key,f])=>(
            <button key={key} onClick={()=>{setTipoForm(key);setPaso("formulario");setSeccionActual(0);setDatos({});}}
              style={{background:"#fff",border:`2px solid ${f.border}`,borderRadius:12,padding:"20px 16px",cursor:"pointer",textAlign:"left",transition:"all 0.15s"}}>
              <div style={{fontSize:28,marginBottom:8}}>{f.icon}</div>
              <div style={{fontWeight:700,fontSize:13,color:f.color,marginBottom:4}}>{key}</div>
              <div style={{fontSize:12,fontWeight:600,color:"#1E293B",marginBottom:4}}>{f.label.split("—")[1]?.trim()}</div>
              <div style={{fontSize:11,color:"#64748B",lineHeight:1.4}}>{f.desc}</div>
            </button>
          ))}
        </div>
        <p style={{textAlign:"center",fontSize:12,color:"rgba(255,255,255,0.5)",marginTop:24}}>
          Sus datos están protegidos y solo serán vistos por nuestra oficina
        </p>
      </div>
    </div>
  );

  // ── Pantalla de éxito ──────────────────────────────────────────────────────
  if(paso==="enviado") return(
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0F172A 0%,#166534 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#fff",borderRadius:16,maxWidth:480,width:"100%",padding:40,textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
        <div style={{fontSize:64,marginBottom:16}}>✅</div>
        <h2 style={{fontSize:22,fontWeight:800,color:"#166534",margin:"0 0 12px"}}>¡Formulario Enviado!</h2>
        <p style={{fontSize:15,color:"#374151",marginBottom:8}}>Hemos recibido su información correctamente.</p>
        <p style={{fontSize:14,color:"#6B7280",marginBottom:24}}>Nuestra oficina revisará sus datos y se comunicará con usted pronto por teléfono o WhatsApp.</p>
        <div style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:10,padding:"14px",marginBottom:24}}>
          <div style={{fontSize:13,fontWeight:600,color:"#166534"}}>📋 Formulario enviado: {FORMULARIOS[tipoForm]?.label}</div>
          <div style={{fontSize:12,color:"#374151",marginTop:4}}>Nombre: {datos.nombre}</div>
          <div style={{fontSize:12,color:"#374151"}}>Teléfono: {datos.telefono}</div>
        </div>
        <button onClick={()=>{setPaso("seleccion");setTipoForm(null);setDatos({});}}
          style={{background:"#1E40AF",color:"#fff",border:"none",borderRadius:9,padding:"12px 28px",fontSize:14,fontWeight:600,cursor:"pointer"}}>
          Enviar otro formulario
        </button>
      </div>
    </div>
  );

  // ── Formulario por secciones ───────────────────────────────────────────────
  const seccion = secciones[seccionActual];
  const pct = Math.round(((seccionActual+1)/totalSecciones)*100);

  return(
    <div style={{minHeight:"100vh",background:"#F1F5F9",paddingBottom:40}}>
      {/* Header */}
      <div style={{background:`linear-gradient(135deg,#0F172A,${form.color})`,padding:"20px 20px 16px",color:"#fff"}}>
        <div style={{maxWidth:600,margin:"0 auto"}}>
          <button onClick={()=>setPaso("seleccion")} style={{background:"rgba(255,255,255,0.15)",border:"none",color:"#fff",borderRadius:7,padding:"6px 12px",fontSize:12,cursor:"pointer",marginBottom:12}}>
            ← Volver
          </button>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
            <span style={{fontSize:28}}>{form.icon}</span>
            <div>
              <h1 style={{margin:0,fontSize:16,fontWeight:700}}>{form.label}</h1>
              <p style={{margin:0,fontSize:12,opacity:0.75}}>{form.desc}</p>
            </div>
          </div>
          {/* Progreso */}
          <div style={{background:"rgba(255,255,255,0.2)",borderRadius:20,height:6,overflow:"hidden",marginBottom:6}}>
            <div style={{height:"100%",borderRadius:20,background:"#fff",width:`${pct}%`,transition:"width 0.3s"}}/>
          </div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:11,opacity:0.8}}>
            <span>Sección {seccionActual+1} de {totalSecciones}: {seccion.titulo}</span>
            <span>{pct}% completado</span>
          </div>
        </div>
      </div>

      {/* Contenido */}
      <div style={{maxWidth:600,margin:"20px auto",padding:"0 16px"}}>
        <div style={{background:"#fff",borderRadius:14,padding:24,boxShadow:"0 2px 8px rgba(0,0,0,0.06)",border:`1px solid ${form.border}`}}>
          <h2 style={{fontSize:15,fontWeight:700,color:"#0F172A",marginBottom:20,paddingBottom:10,borderBottom:`2px solid ${form.border}`}}>
            {seccion.titulo}
          </h2>
          <div style={{display:"grid",gap:14}}>
            {seccion.campos.map(campo=>(
              <div key={campo.id}>
                <label style={{display:"block",fontSize:12,fontWeight:600,color:"#374151",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.04em"}}>
                  {campo.label} {campo.req&&<span style={{color:"#EF4444"}}>*</span>}
                </label>
                <Campo campo={campo} value={datos[campo.id]} onChange={v=>updateDato(campo.id,v)}/>
              </div>
            ))}
          </div>
        </div>

        {error&&<div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:9,padding:"12px 16px",fontSize:13,color:"#DC2626",marginTop:12}}>⚠️ {error}</div>}

        {/* Navegación */}
        <div style={{display:"flex",gap:10,marginTop:16,justifyContent:"space-between"}}>
          <button onClick={()=>{setSeccionActual(p=>p-1);setError("");}} disabled={seccionActual===0}
            style={{padding:"11px 22px",borderRadius:9,border:"1px solid #D1D5DB",background:seccionActual===0?"#F1F5F9":"#fff",color:seccionActual===0?"#9CA3AF":"#374151",fontSize:14,cursor:seccionActual===0?"not-allowed":"pointer",fontWeight:500}}>
            ← Anterior
          </button>
          {seccionActual < totalSecciones-1 ? (
            <button onClick={()=>{if(!seccionCompleta()){setError("Complete los campos obligatorios (*)");return;}setSeccionActual(p=>p+1);setError("");window.scrollTo(0,0);}}
              style={{padding:"11px 28px",borderRadius:9,border:"none",background:form.color,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>
              Siguiente →
            </button>
          ):(
            <button onClick={handleEnviar} disabled={enviando}
              style={{padding:"11px 28px",borderRadius:9,border:"none",background:enviando?"#E5E7EB":"#16A34A",color:enviando?"#9CA3AF":"#fff",fontSize:14,fontWeight:700,cursor:enviando?"not-allowed":"pointer"}}>
              {enviando?"Enviando...":"✅ Enviar formulario"}
            </button>
          )}
        </div>

        {/* Indicadores de sección */}
        <div style={{display:"flex",gap:6,justifyContent:"center",marginTop:16,flexWrap:"wrap"}}>
          {secciones.map((_,i)=>(
            <div key={i} style={{width:8,height:8,borderRadius:"50%",background:i===seccionActual?form.color:i<seccionActual?"#16A34A":"#CBD5E1",transition:"all 0.2s"}}/>
          ))}
        </div>
        <p style={{textAlign:"center",fontSize:11,color:"#94A3B8",marginTop:12}}>
          🔒 Sus datos están protegidos y solo son visibles para nuestra oficina
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Formulario/>);
</script>
</body>
</html>
