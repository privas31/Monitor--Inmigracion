<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ── Configuración ─────────────────────────────────────────────────────────────
const SISTEMAS = {
  uscis: { label:"USCIS", icon:"🏛", color:"#0369A1", bg:"#F0F9FF", border:"#BAE6FD",
    tiposCaso:["I-485 Ajuste de estatus","I-130 Petición familiar","I-765 Permiso de trabajo","I-131 Advance Parole","N-400 Naturalización","I-589 Asilo","I-90 Renovar Green Card","Otro"] },
  eoir:  { label:"EOIR",  icon:"⚖️", color:"#7C3AED", bg:"#F5F3FF", border:"#DDD6FE",
    tiposCaso:["Asilo","Deportación","Cancelación","Ajuste de estatus","Apelación","Otro"] },
  foia:  { label:"FOIA",  icon:"📂", color:"#0891B2", bg:"#ECFEFF", border:"#A5F3FC",
    tiposCaso:["FOIA - Expediente migratorio","FOIA - Expediente USCIS","FOIA - Expediente ICE","FOIA - Expediente CBP","Otro"] },
};
const FOIA_ESTADOS = ["Enviado","En proceso","Respuesta recibida","Cerrado"];
const PROCESOS_COMUNES = ["Asilo (I-589)","Permiso de trabajo (I-765)","Ajuste de estatus (I-485)","Petición familiar (I-130)","Advance Parole (I-131)","Naturalización (N-400)","Renovar Green Card (I-90)","Cancelación de deportación","FOIA","Consultoría","Otro"];
const STATUS_CONFIG = {
  vencido:{label:"Vencida",color:"#DC2626",bg:"#FEF2F2",border:"#FECACA",icon:"🔴"},
  hoy:{label:"Hoy",color:"#EA580C",bg:"#FFF7ED",border:"#FED7AA",icon:"🟠"},
  urgente:{label:"Urgente",color:"#D97706",bg:"#FFFBEB",border:"#FDE68A",icon:"🟡"},
  proximo:{label:"Próxima",color:"#2563EB",bg:"#EFF6FF",border:"#BFDBFE",icon:"🔵"},
  ok:{label:"Al día",color:"#16A34A",bg:"#F0FDF4",border:"#BBF7D0",icon:"🟢"},
  pendiente:{label:"Pendiente",color:"#6B7280",bg:"#F9FAFB",border:"#E5E7EB",icon:"⚪"},
};

// ── Helpers ───────────────────────────────────────────────────────────────────
function getStatus(f){if(!f)return"pendiente";const h=new Date();h.setHours(0,0,0,0);const d=Math.round((new Date(f+"T00:00:00")-h)/86400000);if(d<0)return"vencido";if(d===0)return"hoy";if(d<=3)return"urgente";if(d<=14)return"proximo";return"ok";}
function getDias(f){if(!f)return null;const h=new Date();h.setHours(0,0,0,0);return Math.round((new Date(f+"T00:00:00")-h)/86400000);}
function fmt(f){if(!f)return"—";const[y,m,d]=f.split("-");return`${m}/${d}/${y}`;}
function fmtA(a){const c=(a||"").replace(/\D/g,"").slice(0,9);if(c.length<=3)return c;if(c.length<=6)return c.slice(0,3)+"-"+c.slice(3);return c.slice(0,3)+"-"+c.slice(3,6)+"-"+c.slice(6);}
function eoirUrl(a){return`https://acis.eoir.justice.gov/en/CaseInformation?caseNumber=${(a||"").replace(/\D/g,"")}`;}
function uscisUrl(r){return`https://egov.uscis.gov/casestatus/mycasestatus.do?appReceiptNum=${(r||"").replace(/\s/g,"")}`;}
function fmtMoney(v){if(!v&&v!==0)return"";const n=parseFloat(v.toString().replace(/[^0-9.]/g,""));if(isNaN(n))return"";return"$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}
function parseMoney(v){return parseFloat((v||"0").toString().replace(/[^0-9.]/g,""))||0;}
function getPct(total,pagado){if(!total)return null;return Math.min(100,Math.round((pagado/total)*100));}
function pagoColor(pct){if(pct===null)return"#6B7280";if(pct>=100)return"#16A34A";if(pct>=50)return"#D97706";return"#DC2626";}
function getTotalProcesos(procesos){return(procesos||[]).reduce((s,p)=>s+parseMoney(p.precio),0);}
function getTotalPagado(procesos){return(procesos||[]).reduce((s,p)=>s+parseMoney(p.pagado),0);}

// Obtener la fecha más próxima del cliente considerando todos sus casos
function getProximaFecha(cliente){
  const fechas=[];
  (cliente.casos||[]).forEach(c=>{if(c.fechaCorte)fechas.push(c.fechaCorte);if(c.fechaHuellas)fechas.push(c.fechaHuellas);});
  if(!fechas.length)return null;
  const hoy=new Date();hoy.setHours(0,0,0,0);
  const futuras=fechas.filter(f=>new Date(f+"T00:00:00")>=hoy).sort();
  if(futuras.length)return futuras[0];
  return fechas.sort().reverse()[0];
}
function getStatusCliente(cliente){
  const pf=getProximaFecha(cliente);
  if(!pf)return"pendiente";
  return getStatus(pf);
}

const PAISES=["Afghanistan","Albania","Algeria","Angola","Argentina","Armenia","Azerbaijan","Bahamas","Bangladesh","Belarus","Belize","Bolivia","Brazil","Bulgaria","Burkina Faso","Burma (Myanmar)","Burundi","Cambodia","Cameroon","Chad","Chile","China","Colombia","Congo (DRC)","Costa Rica","Cuba","Dominican Republic","Ecuador","Egypt","El Salvador","Eritrea","Ethiopia","Georgia","Ghana","Guatemala","Guinea","Haiti","Honduras","India","Indonesia","Iran","Iraq","Jamaica","Jordan","Kazakhstan","Kenya","Kosovo","Kyrgyzstan","Lebanon","Liberia","Libya","Mali","Mauritania","Mexico","Moldova","Morocco","Mozambique","Nepal","Nicaragua","Niger","Nigeria","Pakistan","Panama","Paraguay","Peru","Philippines","Romania","Russia","Rwanda","Senegal","Sierra Leone","Somalia","South Sudan","Sri Lanka","Sudan","Syria","Tajikistan","Tanzania","Togo","Trinidad and Tobago","Turkey","Turkmenistan","Uganda","Ukraine","Uzbekistan","Venezuela","Vietnam","Yemen","Zimbabwe","Other"].sort();
const FLAG_MAP={"Mexico":"🇲🇽","Guatemala":"🇬🇹","Honduras":"🇭🇳","El Salvador":"🇸🇻","Cuba":"🇨🇺","Haiti":"🇭🇹","Venezuela":"🇻🇪","Colombia":"🇨🇴","Ecuador":"🇪🇨","Peru":"🇵🇪","Nicaragua":"🇳🇮","Dominican Republic":"🇩🇴","Brazil":"🇧🇷","Bolivia":"🇧🇴","Argentina":"🇦🇷","Chile":"🇨🇱","Jamaica":"🇯🇲","China":"🇨🇳","India":"🇮🇳","Pakistan":"🇵🇰","Philippines":"🇵🇭","Vietnam":"🇻🇳","Ukraine":"🇺🇦","Russia":"🇷🇺","Ethiopia":"🇪🇹","Somalia":"🇸🇴","Nigeria":"🇳🇬","Ghana":"🇬🇭","Cameroon":"🇨🇲","Senegal":"🇸🇳","Syria":"🇸🇾","Iraq":"🇮🇶","Iran":"🇮🇷","Afghanistan":"🇦🇫","Other":"🌍"};
function getFlag(p){return FLAG_MAP[p]||"🌍";}

// ── Datos vacíos ──────────────────────────────────────────────────────────────
const emptyCaso={sistema:"uscis",tipoCaso:"",receiptNum:"",alienNum:"",corte:"",juez:"",fechaCorte:"",fechaHuellas:"",tipoCita:"",tieneEAD:"",eadReceipt:"",eadVence:"",eadRenovado:"",fechaAsilo:"",estatusReloj:"",estatusCaso:"",origenCaso:"",foiaTracking:"",foiaEstado:"",foiaRespuesta:"",procesos:[],nota:""};
const emptyCliente={nombre:"",paisOrigen:"",alienNum:"",telefono:"",email:"",encargada:"",casos:[],nota:""};

// ── Pequeños componentes ──────────────────────────────────────────────────────
function Field({label,value,onChange,type="text",placeholder="",mono=false}){
  return(<div style={{marginBottom:11}}><label style={{display:"block",fontSize:12,fontWeight:600,color:"#374151",marginBottom:3,textTransform:"uppercase",letterSpacing:"0.04em"}}>{label}</label><input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:"100%",padding:"8px 11px",borderRadius:7,border:"1px solid #D1D5DB",fontSize:14,outline:"none",fontFamily:mono?"monospace":"inherit"}}/></div>);
}
function Badge({cfg,label}){return<span style={{background:cfg.bg,color:cfg.color,border:`1px solid ${cfg.border}`,borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{cfg.icon} {label}</span>;}

// ── Editor de procesos de pago ────────────────────────────────────────────────
function ProcesosEditor({procesos,onChange}){
  const add=()=>onChange([...procesos,{nombre:"",precio:"",pagado:"",notas:"",id:Date.now()}]);
  const upd=(i,f,v)=>{const n=[...procesos];n[i]={...n[i],[f]:v};onChange(n);};
  const del=(i)=>onChange(procesos.filter((_,idx)=>idx!==i));
  const total=getTotalProcesos(procesos);const pagado=getTotalPagado(procesos);const pct=getPct(total,pagado);const pc=pagoColor(pct);
  return(<div style={{background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:8,padding:"12px",marginBottom:10}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <div style={{fontSize:12,fontWeight:700,color:"#D97706"}}>💰 Pagos de este proceso</div>
      <button onClick={add} style={{background:"#1E40AF",color:"#fff",border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",fontWeight:600}}>+ Agregar pago</button>
    </div>
    {procesos.length===0&&<div style={{fontSize:11,color:"#94A3B8",textAlign:"center",padding:"6px 0"}}>Sin pagos registrados</div>}
    {procesos.map((p,i)=>(
      <div key={p.id||i} style={{background:"#fff",borderRadius:7,padding:"9px 11px",marginBottom:7,border:"1px solid #FDE68A"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
          <select value={p.nombre} onChange={e=>upd(i,"nombre",e.target.value)} style={{flex:1,padding:"6px 8px",borderRadius:6,border:"1px solid #D1D5DB",fontSize:12,background:"#fff",cursor:"pointer",marginRight:8}}>
            <option value="">Seleccionar proceso...</option>{PROCESOS_COMUNES.map(pc=><option key={pc} value={pc}>{pc}</option>)}
          </select>
          <button onClick={()=>del(i)} style={{background:"#FEF2F2",color:"#EF4444",border:"1px solid #FECACA",borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:6}}>
          <div><label style={{display:"block",fontSize:10,fontWeight:600,color:"#374151",marginBottom:2,textTransform:"uppercase"}}>Precio</label><input value={p.precio} onChange={e=>upd(i,"precio",e.target.value)} placeholder="Ej. 2500" style={{width:"100%",padding:"6px 8px",borderRadius:6,border:"1px solid #D1D5DB",fontSize:12,outline:"none"}}/></div>
          <div><label style={{display:"block",fontSize:10,fontWeight:600,color:"#374151",marginBottom:2,textTransform:"uppercase"}}>Pagado</label><input value={p.pagado} onChange={e=>upd(i,"pagado",e.target.value)} placeholder="Ej. 1000" style={{width:"100%",padding:"6px 8px",borderRadius:6,border:"1px solid #D1D5DB",fontSize:12,outline:"none"}}/></div>
        </div>
        {p.precio&&<><div style={{background:"#E2E8F0",borderRadius:20,height:4}}><div style={{height:"100%",borderRadius:20,background:pagoColor(getPct(parseMoney(p.precio),parseMoney(p.pagado))),width:`${getPct(parseMoney(p.precio),parseMoney(p.pagado))||0}%`}}/></div><div style={{fontSize:10,color:pagoColor(getPct(parseMoney(p.precio),parseMoney(p.pagado))),fontWeight:700,marginTop:2}}>{fmtMoney(p.pagado)||"$0"} / {fmtMoney(p.precio)} — {getPct(parseMoney(p.precio),parseMoney(p.pagado))||0}%</div></>}
        <input value={p.notas||""} onChange={e=>upd(i,"notas",e.target.value)} placeholder="Notas de pago..." style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid #E2E8F0",fontSize:11,outline:"none",marginTop:6}}/>
      </div>
    ))}
    {procesos.length>0&&<div style={{background:"#FEF9C3",borderRadius:7,padding:"8px 11px",border:"1px solid #FDE68A"}}>
      <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:11,fontWeight:700,color:"#92400E"}}>Total</span><span style={{fontSize:12,fontWeight:800,color:"#92400E"}}>{fmtMoney(pagado)} / {fmtMoney(total)}</span></div>
      <div style={{background:"#E2E8F0",borderRadius:20,height:5,marginTop:4}}><div style={{height:"100%",borderRadius:20,background:pc,width:`${pct||0}%`}}/></div>
      <div style={{fontSize:10,color:pc,fontWeight:700,marginTop:2}}>{pct!==null?`${pct}% — Saldo: ${fmtMoney(total-pagado)}`:"Sin info"}</div>
    </div>}
  </div>);
}

// ── Editor de un caso individual ──────────────────────────────────────────────
function CasoEditor({caso,onChange,onDelete,idx}){
  const sys=SISTEMAS[caso.sistema]||SISTEMAS.uscis;
  return(<div style={{background:"#F8FAFC",border:`2px solid ${sys.border}`,borderRadius:10,padding:"14px",marginBottom:12}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div style={{display:"flex",gap:6}}>
        {Object.entries(SISTEMAS).map(([k,s])=>(
          <button key={k} onClick={()=>onChange({...caso,sistema:k,tipoCaso:""})} style={{padding:"5px 10px",borderRadius:7,border:caso.sistema===k?`2px solid ${s.color}`:"1px solid #E2E8F0",background:caso.sistema===k?s.bg:"#fff",color:caso.sistema===k?s.color:"#374151",fontWeight:caso.sistema===k?700:400,fontSize:12,cursor:"pointer"}}>{s.icon} {s.label}</button>
        ))}
      </div>
      <button onClick={onDelete} style={{background:"#FEF2F2",color:"#EF4444",border:"1px solid #FECACA",borderRadius:7,padding:"5px 10px",fontSize:12,cursor:"pointer",fontWeight:600}}>🗑 Eliminar caso</button>
    </div>

    {/* Tipo de caso */}
    <div style={{marginBottom:10}}>
      <label style={{display:"block",fontSize:11,fontWeight:600,color:"#374151",marginBottom:3,textTransform:"uppercase",letterSpacing:"0.04em"}}>Tipo de caso</label>
      <select value={caso.tipoCaso} onChange={e=>onChange({...caso,tipoCaso:e.target.value})} style={{width:"100%",padding:"8px 10px",borderRadius:7,border:"1px solid #D1D5DB",fontSize:13,background:"#fff",cursor:"pointer"}}>
        <option value="">Seleccionar...</option>{SISTEMAS[caso.sistema].tiposCaso.map(t=><option key={t} value={t}>{t}</option>)}
      </select>
    </div>

    {/* Campos EOIR */}
    {caso.sistema==="eoir"&&<>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Field label="Número Alien (A#)" value={caso.alienNum||""} onChange={v=>onChange({...caso,alienNum:v.replace(/[^\d-]/g,"")})} placeholder="012-345-678" mono/>
        <Field label="Corte" value={caso.corte||""} onChange={v=>onChange({...caso,corte:v})} placeholder="Miami Immigration Court"/>
      </div>
      <Field label="Juez asignado" value={caso.juez||""} onChange={v=>onChange({...caso,juez:v})} placeholder="Hon. Rivera"/>
      {/* Origen del caso EOIR */}
      <div style={{marginBottom:10}}>
        <label style={{display:"block",fontSize:11,fontWeight:600,color:"#374151",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.04em"}}>📋 Origen del caso</label>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}}>
          {[
            ["original","📋 Caso original de corte","#0369A1","#F0F9FF","#BAE6FD"],
            ["referido_uscis","🔄 Referido desde USCIS","#7C3AED","#F5F3FF","#DDD6FE"],
            ["apelacion","⚖️ Reabierto / Apelación","#D97706","#FFFBEB","#FDE68A"],
          ].map(([k,l,color,bg,border])=>(
            <button key={k} onClick={()=>onChange({...caso,origenCaso:k})}
              style={{padding:"8px 6px",borderRadius:8,border:caso.origenCaso===k?`2px solid ${color}`:`1px solid ${border}`,background:caso.origenCaso===k?bg:"#fff",color:caso.origenCaso===k?color:"#374151",fontWeight:caso.origenCaso===k?700:400,fontSize:11,cursor:"pointer",textAlign:"center"}}>
              {l}
            </button>
          ))}
        </div>
      </div>
      <Field label="📅 Fecha de corte" value={caso.fechaCorte||""} onChange={v=>onChange({...caso,fechaCorte:v})} type="date"/>
      {/* Reloj de Asilo - solo cuando tipoCaso es Asilo */}
      {(caso.tipoCaso||"").toLowerCase().includes("asilo")&&(
        <div style={{background:"#1E1B4B",border:"1px solid #4338CA",borderRadius:9,padding:"12px 14px",marginBottom:10}}>
          <div style={{fontSize:12,fontWeight:700,color:"#A5B4FC",marginBottom:8}}>⏱️ Reloj de Asilo</div>
          <Field label="📅 Se ingresó asilo el" value={caso.fechaAsilo||""} onChange={v=>onChange({...caso,fechaAsilo:v})} type="date"/>
          {caso.fechaAsilo&&(()=>{
            const inicio=new Date(caso.fechaAsilo+"T00:00:00");
            const hoy=new Date();hoy.setHours(0,0,0,0);
            const dias=Math.floor((hoy-inicio)/86400000);
            const pct=Math.min(100,Math.round((dias/180)*100));
            const color=dias>=180?"#4ADE80":dias>=120?"#FACC15":"#60A5FA";
            return(
              <div style={{background:"rgba(255,255,255,0.05)",borderRadius:8,padding:"10px 12px"}}>
                <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
                  <div style={{textAlign:"center",minWidth:60}}>
                    <div style={{fontSize:36,fontWeight:800,color:color,lineHeight:1}}>{dias}</div>
                    <div style={{fontSize:10,color:"#A5B4FC",marginTop:2}}>días</div>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{background:"#312E81",borderRadius:20,height:8,overflow:"hidden",marginBottom:4}}>
                      <div style={{height:"100%",borderRadius:20,background:color,width:`${pct}%`}}/>
                    </div>
                    <div style={{fontSize:11,color:color,fontWeight:600}}>
                      {dias>=180?`✅ Elegible para EAD — lleva ${dias} días`:`⏳ Faltan ${180-dias} días para aplicar al EAD`}
                    </div>
                  </div>
                </div>
              </div>
            );
          })()}
          {/* Estatus del reloj */}
          <div style={{marginTop:10}}>
            <label style={{display:"block",fontSize:11,fontWeight:600,color:"#A5B4FC",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.04em"}}>Estatus del reloj</label>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}}>
              {[
                ["activo","🟢 Activo","#16A34A","#F0FDF4","#BBF7D0"],
                ["detenido","🔴 Detenido","#DC2626","#FEF2F2","#FECACA"],
                ["sin_dias","⚪ Sin días","#6B7280","#F9FAFB","#E5E7EB"]
              ].map(([k,l,color,bg,border])=>(
                <button key={k} onClick={()=>onChange({...caso,estatusReloj:k})}
                  style={{padding:"8px 6px",borderRadius:8,border:caso.estatusReloj===k?`2px solid ${color}`:`1px solid ${border}`,background:caso.estatusReloj===k?bg:"rgba(255,255,255,0.05)",color:caso.estatusReloj===k?color:"#A5B4FC",fontWeight:caso.estatusReloj===k?700:400,fontSize:12,cursor:"pointer",textAlign:"center"}}>
                  {l}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}
    </>}

    {/* Campos USCIS */}
    {caso.sistema==="uscis"&&<>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Field label="Número de recibo" value={caso.receiptNum||""} onChange={v=>onChange({...caso,receiptNum:v.toUpperCase()})} placeholder="IOE0912345678" mono/>
        <Field label="Número Alien (A#)" value={caso.alienNum||""} onChange={v=>onChange({...caso,alienNum:v.replace(/[^\d-]/g,"")})} placeholder="012-345-678" mono/>
      </div>
      {(caso.tipoCaso||"").includes("I-589")?(
        <div style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:8,padding:"10px 12px",marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:"#1D4ED8",marginBottom:8}}>I-589 Asilo — Citas</div>
          <div style={{marginBottom:8}}>

          <div style={{background:"#1E1B4B",border:"1px solid #4338CA",borderRadius:9,padding:"12px 14px",marginTop:10}}>

                  <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>

                      <div style={{fontSize:36,fontWeight:800,color:color,lineHeight:1}}>{dias}</div>
                      <div style={{fontSize:10,color:"#A5B4FC",marginTop:2}}>días</div>

                    <div style={{flex:1}}>
                      <div style={{background:"#312E81",borderRadius:20,height:8,overflow:"hidden",marginBottom:4}}>

                      </div>
                    </div>
                  </div>

              );

          </div>
        </div>
      ):!(caso.tipoCaso||"").includes("I-765")&&(
        <Field label="📅 Fecha de cita" value={caso.fechaCorte||""} onChange={v=>onChange({...caso,fechaCorte:v})} type="date"/>
      )}
      {/* EAD - solo para I-765 */}
      {(caso.tipoCaso||"").includes("I-765")&&<div style={{marginBottom:10}}>
        <label style={{display:"block",fontSize:11,fontWeight:600,color:"#374151",marginBottom:5,textTransform:"uppercase"}}>💼 Permiso de trabajo (EAD)</label>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:7}}>
          {[["si","✅ Sí tiene"],["no","❌ No tiene"]].map(([k,l])=>(<button key={k} onClick={()=>onChange({...caso,tieneEAD:k,eadReceipt:"",eadVence:"",eadRenovado:""})} style={{padding:"7px",borderRadius:7,border:caso.tieneEAD===k?`2px solid ${k==="si"?"#16A34A":"#DC2626"}`:"1px solid #E2E8F0",background:caso.tieneEAD===k?(k==="si"?"#F0FDF4":"#FEF2F2"):"#fff",color:caso.tieneEAD===k?(k==="si"?"#15803D":"#DC2626"):"#374151",fontWeight:caso.tieneEAD===k?700:400,fontSize:12,cursor:"pointer"}}>{l}</button>))}
        </div>
        {caso.tieneEAD==="si"&&<div style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:8,padding:"10px 12px"}}>
          <Field label="📅 Fecha de vencimiento del EAD" value={caso.eadVence||""} onChange={v=>onChange({...caso,eadVence:v})} type="date"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
            {[["si","✅ Renovado"],["no","⏳ Pendiente renovar"]].map(([k,l])=>(<button key={k} onClick={()=>onChange({...caso,eadRenovado:k})} style={{padding:"6px",borderRadius:7,border:caso.eadRenovado===k?`2px solid ${k==="si"?"#16A34A":"#D97706"}`:"1px solid #E2E8F0",background:caso.eadRenovado===k?(k==="si"?"#F0FDF4":"#FFFBEB"):"#fff",color:caso.eadRenovado===k?(k==="si"?"#15803D":"#D97706"):"#374151",fontWeight:caso.eadRenovado===k?700:400,fontSize:12,cursor:"pointer"}}>{l}</button>))}
          </div>
        </div>}
        {caso.tieneEAD==="no"&&<div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:8,padding:"10px 12px"}}>
          <Field label="📅 Fecha en que puede aplicar al EAD" value={caso.eadVence||""} onChange={v=>onChange({...caso,eadVence:v})} type="date"/>

      {/* Estatus del caso USCIS */}
      <div style={{marginBottom:10}}>
        <label style={{display:"block",fontSize:11,fontWeight:600,color:"#374151",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.04em"}}>📋 Estatus del caso USCIS</label>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
          {[
            ["activo","✅ Activo","#16A34A","#F0FDF4","#BBF7D0"],

            ["aprobado","🔒 Cerrado — Aprobado","#0369A1","#F0F9FF","#BAE6FD"],

            <button key={k} onClick={()=>onChange({...caso,estatusCaso:k})}
              style={{padding:"8px 8px",borderRadius:8,border:caso.estatusCaso===k?`2px solid ${color}`:`1px solid ${border}`,background:caso.estatusCaso===k?bg:"#fff",color:caso.estatusCaso===k?color:"#374151",fontWeight:caso.estatusCaso===k?700:400,fontSize:11,cursor:"pointer",textAlign:"center"}}>
              {l}
            </button>
          ))}
        </div>
      </div>
    </>}

    {/* Campos FOIA */}
    {caso.sistema==="foia"&&<>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        <Field label="Tracking Number" value={caso.foiaTracking||""} onChange={v=>onChange({...caso,foiaTracking:v})} placeholder="NRC2024123456" mono/>
        <div style={{marginBottom:11}}>
          <label style={{display:"block",fontSize:11,fontWeight:600,color:"#374151",marginBottom:3,textTransform:"uppercase"}}>Estado</label>
          <select value={caso.foiaEstado||""} onChange={e=>onChange({...caso,foiaEstado:e.target.value})} style={{width:"100%",padding:"8px 10px",borderRadius:7,border:"1px solid #D1D5DB",fontSize:13,background:"#fff",cursor:"pointer"}}>
            <option value="">Seleccionar...</option>{FOIA_ESTADOS.map(e=><option key={e} value={e}>{e}</option>)}
          </select>
        </div>
      </div>
      <Field label="Fecha de envío" value={caso.fechaCorte||""} onChange={v=>onChange({...caso,fechaCorte:v})} type="date"/>
      <div style={{marginBottom:10}}>
        <label style={{display:"block",fontSize:11,fontWeight:600,color:"#374151",marginBottom:3,textTransform:"uppercase"}}>Respuesta / Notas</label>
        <textarea value={caso.foiaRespuesta||""} onChange={e=>onChange({...caso,foiaRespuesta:e.target.value})} placeholder="Notas de la respuesta..." rows={2} style={{width:"100%",padding:"7px 10px",borderRadius:7,border:"1px solid #D1D5DB",fontSize:13,resize:"vertical",outline:"none"}}/>
      </div>
    </>}

    {/* Notas del caso */}
    <div style={{marginBottom:10}}>
      <label style={{display:"block",fontSize:11,fontWeight:600,color:"#374151",marginBottom:3,textTransform:"uppercase"}}>Notas del caso</label>
      <textarea value={caso.nota||""} onChange={e=>onChange({...caso,nota:e.target.value})} placeholder="Observaciones..." rows={2} style={{width:"100%",padding:"7px 10px",borderRadius:7,border:"1px solid #D1D5DB",fontSize:13,resize:"vertical",outline:"none"}}/>
    </div>

    {/* Pagos */}
    <ProcesosEditor procesos={caso.procesos||[]} onChange={v=>onChange({...caso,procesos:v})}/>
  </div>);
}

// ── MAIN APP ──────────────────────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(null);const[authLoading,setAuthLoading]=useState(true);
  const[clientes,setClientes]=useState([]);const[loading,setLoading]=useState(false);
  const[showModal,setShowModal]=useState(false);const[editId,setEditId]=useState(null);const[formCliente,setFormCliente]=useState(emptyCliente);
  const[filtroStatus,setFiltroStatus]=useState("todos");const[filtroSistema,setFiltroSistema]=useState("todos");
  const[busqueda,setBusqueda]=useState("");const[saving,setSaving]=useState(false);
  const[toast,setToast]=useState(null);const[sortBy,setSortBy]=useState("fecha");
  const[confirmDelete,setConfirmDelete]=useState(null);const[expandedId,setExpandedId]=useState(null);const[activeCasoTab,setActiveCasoTab]=useState({});
  const[showPDF,setShowPDF]=useState(false);const[pdfOpts,setPdfOpts]=useState({sistema:"todos",estado:"todos"});
  const[showAddUser,setShowAddUser]=useState(false);const[newUserEmail,setNewUserEmail]=useState("");const[newUserPass,setNewUserPass]=useState("");const[addUserMsg,setAddUserMsg]=useState("");
  const[equipo,setEquipo]=useState([]);const[showTeam,setShowTeam]=useState(false);const[newMember,setNewMember]=useState("");

  useEffect(()=>{const{auth,onAuthStateChanged}=window._firebase;return onAuthStateChanged(auth,u=>{setUser(u);setAuthLoading(false);});},[]);
  useEffect(()=>{if(!user)return;loadCases();loadTeam();loadBorradores();},[user]);

  const loadCases=async()=>{setLoading(true);try{const{db,collection,getDocs,query,orderBy}=window._firebase;const q=query(collection(db,"clientes"),orderBy("createdAt","desc"));const snap=await getDocs(q);setClientes(snap.docs.map(d=>({id:d.id,...d.data()})));}catch(e){console.error(e);}setLoading(false);};
  const loadTeam=async()=>{try{const{db,doc,getDoc}=window._firebase;const snap=await getDoc(doc(db,"config","equipo"));if(snap.exists())setEquipo(snap.data().miembros||[]);}catch(e){}};

  const loadBorradores=async()=>{setBorradoresLoading(true);try{const{db,collection,getDocs,query,orderBy}=window._firebase;const q=query(collection(db,"borradores"),orderBy("fechaEnvio","desc"));const snap=await getDocs(q);const all=snap.docs.map(d=>({id:d.id,...d.data()}));setBorradores(all);setBorradoresPendientes(all.filter(b=>b.estado==="borrador").length);}catch(e){console.error(e);}setBorradoresLoading(false);};

  const activarBorrador=async(b)=>{try{const{db,collection,addDoc,doc,deleteDoc}=window._firebase;await addDoc(collection(db,"clientes"),{nombre:b.nombre||"",paisOrigen:b.paisOrigen||"",alienNum:b.alienNum||"",telefono:b.telefono||"",email:b.email||"",encargada:"",casos:[{...emptyCaso,sistema:b.tipoFormulario==="I-589"||b.tipoFormulario==="FOIA"?"uscis":"uscis",tipoCaso:b.labelFormulario||"",alienNum:b.alienNum||"",receiptNum:"",fechaCorte:"",procesos:[],nota:`Intake: ${b.notas||b.razonAsilo||""}`,}],nota:`Formulario de intake recibido el ${new Date(b.fechaEnvio).toLocaleDateString("es-MX")}. ${b.notas||""}`,createdAt:new Date().toISOString(),createdBy:user.email,fromIntake:true});await deleteDoc(doc(db,"borradores",b.id));setBorradores(prev=>prev.filter(x=>x.id!==b.id));setBorradoresPendientes(prev=>prev-1);loadCases();showToast("✅ Cliente activado desde formulario");setShowBorradores(false);}catch(e){showToast("Error al activar","error");}};

  const rechazarBorrador=async(id)=>{try{const{db,doc,deleteDoc}=window._firebase;await deleteDoc(doc(db,"borradores",id));setBorradores(prev=>prev.filter(x=>x.id!==id));setBorradoresPendientes(prev=>Math.max(0,prev-1));showToast("Borrador eliminado");}catch(e){showToast("Error","error");}};;
  const saveTeam=async(lista)=>{try{const{db,doc,setDoc}=window._firebase;await setDoc(doc(db,"config","equipo"),{miembros:lista});setEquipo(lista);showToast("Equipo actualizado ✓");}catch(e){showToast("Error","error");}};
  const addMember=()=>{if(!newMember.trim())return;saveTeam([...equipo,newMember.trim()]);setNewMember("");};
  const removeMember=(i)=>saveTeam(equipo.filter((_,idx)=>idx!==i));
  const showToast=(msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};
  const handleLogout=async()=>{const{auth,signOut}=window._firebase;await signOut(auth);};

  const openAdd=()=>{setEditId(null);setFormCliente({...emptyCliente,casos:[]});setShowModal(true);};
  const openEdit=(c)=>{setEditId(c.id);setFormCliente({nombre:c.nombre||"",paisOrigen:c.paisOrigen||"",alienNum:c.alienNum||"",telefono:c.telefono||"",email:c.email||"",encargada:c.encargada||"",casos:(c.casos||[]).map(ca=>({...emptyCaso,...ca})),nota:c.nota||""});setShowModal(true);};

  const addCaso=()=>setFormCliente(p=>({...p,casos:[...p.casos,{...emptyCaso,id:Date.now(),alienNum:p.alienNum||""}]}));
  const updateCaso=(i,v)=>setFormCliente(p=>{const c=[...p.casos];c[i]=v;return{...p,casos:c};});
  const deleteCaso=(i)=>setFormCliente(p=>({...p,casos:p.casos.filter((_,idx)=>idx!==i)}));

  const handleSubmit=async()=>{if(!formCliente.nombre)return;setSaving(true);
    try{const{db,collection,addDoc,doc,updateDoc}=window._firebase;
      if(editId){await updateDoc(doc(db,"clientes",editId),{...formCliente,updatedAt:new Date().toISOString(),updatedBy:user.email});setClientes(prev=>prev.map(c=>c.id===editId?{...c,...formCliente}:c));showToast("Cliente actualizado ✓");}
      else{const ref=await addDoc(collection(db,"clientes"),{...formCliente,createdAt:new Date().toISOString(),createdBy:user.email});setClientes(prev=>[{id:ref.id,...formCliente,createdAt:new Date().toISOString()},...prev]);showToast("Cliente agregado ✓");}
    }catch(e){showToast("Error al guardar","error");}setSaving(false);setShowModal(false);};

  const handleDelete=async(id)=>{try{const{db,doc,deleteDoc}=window._firebase;await deleteDoc(doc(db,"clientes",id));setClientes(prev=>prev.filter(c=>c.id!==id));showToast("Cliente eliminado");}catch(e){showToast("Error","error");}setConfirmDelete(null);};
  const handleAddUser=async()=>{if(!newUserEmail||!newUserPass)return;try{const{auth,createUserWithEmailAndPassword}=window._firebase;await createUserWithEmailAndPassword(auth,newUserEmail,newUserPass);setAddUserMsg("✅ Usuario creado");setNewUserEmail("");setNewUserPass("");}catch(e){setAddUserMsg("❌ "+e.message);}};

  // Filtros
  const filtered=clientes.filter(c=>{
    const st=getStatusCliente(c);
    if(filtroStatus!=="todos"&&st!==filtroStatus)return false;
    if(filtroSistema!=="todos"&&!(c.casos||[]).some(ca=>ca.sistema===filtroSistema))return false;
    const q=busqueda.toLowerCase();
    return!q||c.nombre.toLowerCase().includes(q)||(c.alienNum||"").replace(/\D/g,"").includes(q.replace(/\D/g,""))||(c.encargada||"").toLowerCase().includes(q)||(c.paisOrigen||"").toLowerCase().includes(q)||(c.casos||[]).some(ca=>(ca.receiptNum||"").toLowerCase().includes(q)||(ca.foiaTracking||"").toLowerCase().includes(q));
  }).sort((a,b)=>{
    if(sortBy==="fecha"){const fa=getProximaFecha(a),fb=getProximaFecha(b);if(!fa)return 1;if(!fb)return -1;return new Date(fa)-new Date(fb);}
    return a.nombre.localeCompare(b.nombre);
  });

  const cnt=(s,sys="todos")=>clientes.filter(c=>(sys==="todos"||(c.casos||[]).some(ca=>ca.sistema===sys))&&(s==="todos"||getStatusCliente(c)===s)).length;

  // ── Estadísticas ─────────────────────────────────────────────────────────────
  const [showDashboard,setShowDashboard]=useState(false);
  const [borradores,setBorradores]=useState([]);
  const [showBorradores,setShowBorradores]=useState(false);
  const [borradoresLoading,setBorradoresLoading]=useState(false);
  const [borradoresPendientes,setBorradoresPendientes]=useState(0);
  const stats = React.useMemo(()=>{
    const hoy=new Date();hoy.setHours(0,0,0,0);
    const en7dias=new Date(hoy);en7dias.setDate(en7dias.getDate()+7);
    const alertas=clientes.filter(c=>{const pf=getProximaFecha(c);if(!pf)return false;const d=new Date(pf+"T00:00:00");return d>=hoy&&d<=en7dias;});
    const vencidos=clientes.filter(c=>getStatusCliente(c)==="vencido");
    const totalCobrar=clientes.reduce((s,c)=>(c.casos||[]).reduce((s2,ca)=>s2+getTotalProcesos(ca.procesos||[]),s),0);
    const totalCobrado=clientes.reduce((s,c)=>(c.casos||[]).reduce((s2,ca)=>s2+getTotalPagado(ca.procesos||[]),s),0);
    const pendiente=totalCobrar-totalCobrado;
    const eadElegibles=clientes.filter(c=>(c.casos||[]).some(ca=>{if(!ca.fechaAsilo)return false;const dias=Math.floor((hoy-new Date(ca.fechaAsilo+"T00:00:00"))/86400000);return dias>=180;}));
    const pagadoCompleto=clientes.filter(c=>{const t=(c.casos||[]).reduce((s,ca)=>s+getTotalProcesos(ca.procesos||[]),0);const p=(c.casos||[]).reduce((s,ca)=>s+getTotalPagado(ca.procesos||[]),0);return t>0&&p>=t;});
    const conSaldo=clientes.filter(c=>{const t=(c.casos||[]).reduce((s,ca)=>s+getTotalProcesos(ca.procesos||[]),0);const p=(c.casos||[]).reduce((s,ca)=>s+getTotalPagado(ca.procesos||[]),0);return t>0&&p<t;});
    const sinPago=clientes.filter(c=>{const t=(c.casos||[]).reduce((s,ca)=>s+getTotalProcesos(ca.procesos||[]),0);const p=(c.casos||[]).reduce((s,ca)=>s+getTotalPagado(ca.procesos||[]),0);return t>0&&p===0;});
    return{alertas,vencidos,totalCobrar,totalCobrado,pendiente,eadElegibles,pagadoCompleto,conSaldo,sinPago};
  },[clientes]);

  const generatePDF=()=>{

                            const label=ca.sistema==="eoir"?"📅 Fecha de corte":(ca.tipoCaso||"").includes("I-589")?"🎤 Fecha de entrevista":ca.tipoCita==="entrevista"?"🎤 Fecha de entrevista":ca.tipoCita==="huellas"?"🫆 Biometrics":"📅 Fecha de cita";
                            const bgColor=scfgCaso===STATUS_CONFIG.vencido?"#FEF2F2":scfgCaso===STATUS_CONFIG.hoy?"#FFF7ED":scfgCaso===STATUS_CONFIG.urgente?"#FFFBEB":scfgCaso===STATUS_CONFIG.proximo?"#EFF6FF":"#F0FDF4";
                            const borderColor=scfgCaso===STATUS_CONFIG.vencido?"#FECACA":scfgCaso===STATUS_CONFIG.hoy?"#FED7AA":scfgCaso===STATUS_CONFIG.urgente?"#FDE68A":scfgCaso===STATUS_CONFIG.proximo?"#BFDBFE":"#BBF7D0";
                            return(
                              <div style={{gridColumn:"1/-1",background:bgColor,border:`2px solid ${borderColor}`,borderRadius:10,padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                                <div>
                                  <div style={{fontSize:11,color:"#64748B",textTransform:"uppercase",letterSpacing:"0.05em",fontWeight:600,marginBottom:4}}>{label}</div>
                                  <div style={{fontSize:28,fontWeight:800,color:scfgCaso.color,lineHeight:1}}>{fmt(ca.fechaCorte)}</div>
                                </div>
                                <div style={{textAlign:"center"}}>
                                  <div style={{background:scfgCaso.color,color:"#fff",borderRadius:20,padding:"6px 16px",fontSize:13,fontWeight:700}}>
                                    {dias!==null?(dias<0?`Hace ${Math.abs(dias)} días`:dias===0?"¡HOY!":`En ${dias} día${dias!==1?"s":""}`):"-"}
                                  </div>
                                  <div style={{fontSize:11,color:"#94A3B8",marginTop:4}}>{scfgCaso.icon} {scfgCaso.label}</div>
                                </div>
                              </div>
                            );
                          })()}
                          {/* Fecha huellas - solo USCIS */}
                          {ca.fechaHuellas&&ca.sistema==="uscis"&&<div><div style={{fontSize:11,color:"#94A3B8",textTransform:"uppercase"}}>🫆 Biometrics</div><div style={{fontSize:13,fontWeight:600}}>{fmt(ca.fechaHuellas)}</div></div>}
                          {/* FOIA fields - solo sistema FOIA */}
                          {ca.sistema==="foia"&&ca.foiaTracking&&<div><div style={{fontSize:11,color:"#94A3B8",textTransform:"uppercase"}}>Tracking #</div><div style={{fontSize:13,fontFamily:"monospace",fontWeight:600,color:"#0891B2"}}>{ca.foiaTracking}</div></div>}
                          {ca.sistema==="foia"&&ca.foiaEstado&&<div><div style={{fontSize:11,color:"#94A3B8",textTransform:"uppercase"}}>Estado FOIA</div><div style={{fontSize:13,fontWeight:600,color:ca.foiaEstado==="Respuesta recibida"?"#16A34A":"#D97706"}}>{ca.foiaEstado==="Respuesta recibida"?"✅":ca.foiaEstado==="En proceso"?"⏳":"📤"} {ca.foiaEstado}</div></div>}
                          {ca.sistema==="foia"&&ca.foiaRespuesta&&<div style={{gridColumn:"1/-1"}}><div style={{fontSize:11,color:"#94A3B8",textTransform:"uppercase"}}>Respuesta FOIA</div><div style={{fontSize:13,color:"#475569",fontStyle:"italic"}}>📝 {ca.foiaRespuesta}</div></div>}
                          {/* EAD - solo I-765 */}
                          {(ca.tipoCaso||"").includes("I-765")&&ca.tieneEAD&&<div style={{gridColumn:"1/-1",background:ca.tieneEAD==="si"?"#F0FDF4":"#FEF2F2",border:`1px solid ${ca.tieneEAD==="si"?"#BBF7D0":"#FECACA"}`,borderRadius:8,padding:"9px 12px"}}>
                            <div style={{fontSize:12,fontWeight:700,color:ca.tieneEAD==="si"?"#15803D":"#DC2626",marginBottom:ca.eadVence?6:0}}>{ca.tieneEAD==="si"?"✅ Tiene EAD":"❌ Sin EAD — Puede aplicar"}</div>
                            {ca.eadVence&&<div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
                              <div><div style={{fontSize:10,color:"#6B7280",textTransform:"uppercase"}}>{ca.tieneEAD==="si"?"Vence":"Puede aplicar el"}</div><div style={{fontSize:13,fontWeight:700,color:ca.tieneEAD==="si"&&getDias(ca.eadVence)!==null&&getDias(ca.eadVence)<=30?"#DC2626":"#15803D"}}>{fmt(ca.eadVence)}{ca.tieneEAD==="si"&&getDias(ca.eadVence)!==null&&getDias(ca.eadVence)<=30&&" ⚠️"}</div></div>
                              {ca.tieneEAD==="si"&&ca.eadRenovado&&<div><div style={{fontSize:10,color:"#6B7280",textTransform:"uppercase"}}>Renovación</div><div style={{fontSize:12,fontWeight:600,color:ca.eadRenovado==="si"?"#15803D":"#D97706"}}>{ca.eadRenovado==="si"?"✅ Renovado":"⏳ Pendiente renovar"}</div></div>}
                            </div>}
                          </div>}
                          {ca.nota&&<div style={{gridColumn:"1/-1"}}><div style={{fontSize:11,color:"#94A3B8",textTransform:"uppercase"}}>Notas</div><div style={{fontSize:13,color:"#475569",fontStyle:"italic"}}>📝 {ca.nota}</div></div>}
                        </div>
                        {/* Links */}
                        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>
                          {ca.sistema==="eoir"&&ca.alienNum&&<><a href={eoirUrl(ca.alienNum)} target="_blank" rel="noreferrer" style={{background:"#7C3AED",color:"#fff",borderRadius:7,padding:"6px 12px",fontSize:12,textDecoration:"none",fontWeight:600}}>⚖️ Ver en EOIR →</a><a href={`https://migraconnect.us?a=${(ca.alienNum||"").replace(/\D/g,"")}`} target="_blank" rel="noreferrer" style={{background:"#059669",color:"#fff",borderRadius:7,padding:"6px 12px",fontSize:12,textDecoration:"none",fontWeight:600}}>🌐 MigraConnect →</a></>}
                          {ca.sistema==="uscis"&&ca.receiptNum&&<a href={uscisUrl(ca.receiptNum)} target="_blank" rel="noreferrer" style={{background:"#0369A1",color:"#fff",borderRadius:7,padding:"6px 12px",fontSize:12,textDecoration:"none",fontWeight:600}}>🏛 Ver en USCIS →</a>}
                        </div>
                        {/* Pagos */}
                        {(ca.procesos||[]).length>0&&(()=>{const totalC=getTotalProcesos(ca.procesos||[]);const pagadoC=getTotalPagado(ca.procesos||[]);const pctC=getPct(totalC,pagadoC);const pcC=pagoColor(pctC);return(
                          <div style={{background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:8,padding:"10px 12px"}}>
                            <div style={{fontSize:11,fontWeight:700,color:"#92400E",marginBottom:8}}>💰 Pagos</div>
                            {(ca.procesos||[]).map((p,pi)=>{const pp=getPct(parseMoney(p.precio),parseMoney(p.pagado));return(
                              <div key={pi} style={{marginBottom:8,paddingBottom:8,borderBottom:pi<(ca.procesos||[]).length-1?"1px dashed #FDE68A":"none"}}>
                                <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12,fontWeight:600,color:"#374151"}}>{p.nombre||"—"}</span><span style={{fontSize:11,color:"#64748B"}}>{fmtMoney(p.pagado)||"$0"} / {fmtMoney(p.precio)||"—"}</span></div>
                                {p.precio&&<><div style={{background:"#E2E8F0",borderRadius:20,height:4,marginTop:3}}><div style={{height:"100%",borderRadius:20,background:pagoColor(pp),width:`${pp||0}%`}}/></div><div style={{fontSize:10,color:pagoColor(pp),fontWeight:700,marginTop:1}}>{pp!==null?`${pp}%`:"Sin pago"}</div></>}
                                {p.notas&&<div style={{fontSize:11,color:"#6B7280",fontStyle:"italic",marginTop:2}}>📝 {p.notas}</div>}
                              </div>
                            );})}
                            <div style={{background:"#FEF9C3",borderRadius:7,padding:"7px 10px",marginTop:4}}>
                              <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:11,fontWeight:700,color:"#92400E"}}>Total</span><span style={{fontSize:12,fontWeight:800,color:"#92400E"}}>{fmtMoney(pagadoC)} / {fmtMoney(totalC)}</span></div>
                              <div style={{background:"#E2E8F0",borderRadius:20,height:5,marginTop:3}}><div style={{height:"100%",borderRadius:20,background:pcC,width:`${pctC||0}%`}}/></div>
                              <div style={{fontSize:10,color:pcC,fontWeight:700,marginTop:2}}>{pctC!==null?`${pctC}% — Saldo: ${fmtMoney(totalC-pagadoC)}`:"Sin info"}</div>
                            </div>
                          </div>
                        );})()}
                      </div>
                    );})()}
                  </div>
                )}
                {exp&&(c.casos||[]).length===0&&<div style={{padding:"16px",textAlign:"center",color:"#94A3B8",fontSize:13,borderTop:"1px solid #F1F5F9"}}>Sin casos registrados. Edita el cliente para agregar casos.</div>}
              </div>
            );
          })}
        </div>
      )}
    </div>

    {/* MODAL ADD/EDIT CLIENTE */}
    {showModal&&(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16}}>
        <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:580,padding:26,boxShadow:"0 20px 60px rgba(0,0,0,0.2)",maxHeight:"94vh",overflowY:"auto"}}>
          <h2 style={{margin:"0 0 16px",fontSize:17,fontWeight:700,color:"#0F172A"}}>{editId?"✏️ Editar cliente":"👤 Nuevo cliente"}</h2>

          {/* Info personal */}
          <div style={{background:"#F8FAFC",borderRadius:10,padding:"14px",marginBottom:16,border:"1px solid #E2E8F0"}}>
            <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:10,textTransform:"uppercase",letterSpacing:"0.04em"}}>Información personal</div>
            <Field label="Nombre completo *" value={formCliente.nombre} onChange={v=>setFormCliente(p=>({...p,nombre:v}))} placeholder="Ej. Ada Alicia Caceres Urbina"/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Field label="Número Alien (A#)" value={formCliente.alienNum} onChange={v=>setFormCliente(p=>({...p,alienNum:v.replace(/[^\d-]/g,"")}))} placeholder="012-345-678" mono/>
              <div style={{marginBottom:11}}>
                <label style={{display:"block",fontSize:12,fontWeight:600,color:"#374151",marginBottom:3,textTransform:"uppercase",letterSpacing:"0.04em"}}>País de origen</label>
                <select value={formCliente.paisOrigen} onChange={e=>setFormCliente(p=>({...p,paisOrigen:e.target.value}))} style={{width:"100%",padding:"8px 11px",borderRadius:7,border:"1px solid #D1D5DB",fontSize:14,background:"#fff",cursor:"pointer"}}>
                  <option value="">Seleccionar...</option>{PAISES.map(p=><option key={p} value={p}>{getFlag(p)} {p}</option>)}
                </select>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <Field label="📱 Teléfono" value={formCliente.telefono||""} onChange={v=>setFormCliente(p=>({...p,telefono:v}))} placeholder="Ej. (407) 555-1234" type="tel"/>
              <Field label="📧 Email" value={formCliente.email||""} onChange={v=>setFormCliente(p=>({...p,email:v}))} placeholder="Ej. cliente@email.com" type="email"/>
            </div>
            <div style={{marginBottom:11}}>
              <label style={{display:"block",fontSize:12,fontWeight:600,color:"#374151",marginBottom:3,textTransform:"uppercase",letterSpacing:"0.04em"}}>👩 Encargada</label>
              <select value={formCliente.encargada} onChange={e=>setFormCliente(p=>({...p,encargada:e.target.value}))} style={{width:"100%",padding:"8px 11px",borderRadius:7,border:"1px solid #D1D5DB",fontSize:14,background:"#fff",cursor:"pointer"}}>
                <option value="">Sin asignar</option>{equipo.map(m=><option key={m} value={m}>{m}</option>)}
              </select>
            </div>
            <div>
              <label style={{display:"block",fontSize:12,fontWeight:600,color:"#374151",marginBottom:3,textTransform:"uppercase",letterSpacing:"0.04em"}}>Notas generales</label>
              <textarea value={formCliente.nota} onChange={e=>setFormCliente(p=>({...p,nota:e.target.value}))} placeholder="Observaciones del cliente..." rows={2} style={{width:"100%",padding:"8px 11px",borderRadius:7,border:"1px solid #D1D5DB",fontSize:14,resize:"vertical",outline:"none"}}/>
            </div>
          </div>

          {/* Casos */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:700,color:"#0F172A"}}>⚖️ Casos del cliente</div>
            <button onClick={addCaso} style={{background:"#1E40AF",color:"#fff",border:"none",borderRadius:8,padding:"7px 14px",fontSize:12,cursor:"pointer",fontWeight:600}}>+ Agregar caso</button>
          </div>
          {formCliente.casos.length===0&&<div style={{textAlign:"center",padding:"20px",color:"#94A3B8",fontSize:13,background:"#F8FAFC",borderRadius:10,border:"1px dashed #E2E8F0",marginBottom:14}}>Sin casos. Haz clic en "+ Agregar caso" para añadir USCIS, EOIR o FOIA.</div>}
          {formCliente.casos.map((ca,i)=>(
            <CasoEditor key={ca.id||i} caso={ca} onChange={v=>updateCaso(i,v)} onDelete={()=>deleteCaso(i)} idx={i}/>
          ))}

          <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:8}}>
            <button onClick={()=>setShowModal(false)} style={{padding:"9px 20px",borderRadius:8,border:"1px solid #D1D5DB",background:"#fff",color:"#374151",fontSize:14,cursor:"pointer"}}>Cancelar</button>
            <button onClick={handleSubmit} disabled={!formCliente.nombre||saving} style={{padding:"9px 20px",borderRadius:8,border:"none",background:(!formCliente.nombre||saving)?"#E5E7EB":"#1E40AF",color:(!formCliente.nombre||saving)?"#9CA3AF":"#fff",fontSize:14,fontWeight:600,cursor:(!formCliente.nombre||saving)?"not-allowed":"pointer"}}>{saving?"Guardando...":editId?"Guardar cambios":"Agregar cliente"}</button>
          </div>
        </div>
      </div>
    )}

    {/* MODAL BORRADORES */}
    {showBorradores&&(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16}}>
        <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:680,padding:24,boxShadow:"0 20px 60px rgba(0,0,0,0.2)",maxHeight:"90vh",overflowY:"auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <div>
              <h2 style={{margin:0,fontSize:18,fontWeight:700,color:"#0F172A"}}>📋 Formularios Recibidos</h2>
              <p style={{fontSize:12,color:"#64748B",margin:"3px 0 0"}}>Revisa, completa y activa los clientes nuevos</p>
            </div>
            <button onClick={()=>setShowBorradores(false)} style={{background:"#F1F5F9",border:"none",borderRadius:8,padding:"8px 14px",fontSize:13,cursor:"pointer",fontWeight:600}}>✕ Cerrar</button>
          </div>

          {borradoresLoading?<div style={{textAlign:"center",padding:40,color:"#94A3B8"}}>⏳ Cargando...</div>:
          borradores.length===0?(
            <div style={{textAlign:"center",padding:40,color:"#94A3B8"}}>

              <div>No hay formularios pendientes</div>

                      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                        <span style={{fontWeight:700,fontSize:15,color:"#0F172A"}}>{b.nombre||"Sin nombre"}</span>
                        <span style={{background:"#EFF6FF",color:"#2563EB",border:"1px solid #BFDBFE",borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:600}}>{b.tipoFormulario}</span>
                        <span style={{background:"#FEF9C3",color:"#92400E",borderRadius:20,padding:"2px 9px",fontSize:11}}>⏳ Pendiente</span>

                      <div style={{display:"flex",gap:12,marginTop:4,flexWrap:"wrap"}}>
                        {b.telefono&&<span style={{fontSize:12,color:"#64748B"}}>📱 {b.telefono}</span>}
                        {b.email&&<span style={{fontSize:12,color:"#64748B"}}>📧 {b.email}</span>}
                        {b.paisOrigen&&<span style={{fontSize:12,color:"#64748B"}}>🌍 {b.paisOrigen}</span>}
                      </div>
                    </div>
                    <div style={{fontSize:11,color:"#94A3B8",textAlign:"right"}}>
                      {new Date(b.fechaEnvio).toLocaleDateString("es-MX",{day:"2-digit",month:"short",year:"numeric"})}
                    </div>
                  </div>

                  {/* Datos clave */}
                  <div style={{background:"#fff",borderRadius:8,padding:"10px 12px",marginBottom:10,border:"1px solid #E2E8F0",fontSize:12}}>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(200px,1fr))",gap:6}}>
                      {b.fechaNacimiento&&<div><span style={{color:"#94A3B8"}}>Nacimiento: </span><span style={{fontWeight:500}}>{b.fechaNacimiento}</span></div>}
                      {b.alienNum&&<div><span style={{color:"#94A3B8"}}>A#: </span><span style={{fontFamily:"monospace",fontWeight:600}}>{b.alienNum}</span></div>}
                      {b.formaEntrada&&<div><span style={{color:"#94A3B8"}}>Entrada: </span><span style={{fontWeight:500}}>{b.formaEntrada}</span></div>}
                      {b.estadoCivil&&<div><span style={{color:"#94A3B8"}}>Estado civil: </span><span style={{fontWeight:500}}>{b.estadoCivil}</span></div>}
                      {b.razonAsilo&&<div style={{gridColumn:"1/-1"}}><span style={{color:"#94A3B8"}}>Razón asilo: </span><span style={{fontStyle:"italic"}}>{b.razonAsilo?.slice(0,100)}{b.razonAsilo?.length>100?"...":""}</span></div>}
                      {b.notas&&<div style={{gridColumn:"1/-1"}}><span style={{color:"#94A3B8"}}>Notas: </span><span style={{fontStyle:"italic"}}>{b.notas?.slice(0,100)}</span></div>}
                    </div>
                  </div>

                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    <button onClick={()=>activarBorrador(b)}
                      style={{background:"#16A34A",color:"#fff",border:"none",borderRadius:7,padding:"8px 16px",fontSize:12,cursor:"pointer",fontWeight:600}}>
                      ✅ Activar como cliente
                    </button>
                    <button onClick={()=>{setEditId(null);setFormCliente({nombre:b.nombre||"",paisOrigen:b.paisOrigen||"",alienNum:b.alienNum||"",telefono:b.telefono||"",email:b.email||"",encargada:"",casos:[{...emptyCaso}],nota:`Intake ${b.tipoFormulario}: ${b.razonAsilo||b.notas||""}`});setShowBorradores(false);setShowModal(true);}}
                      style={{background:"#1E40AF",color:"#fff",border:"none",borderRadius:7,padding:"8px 16px",fontSize:12,cursor:"pointer",fontWeight:600}}>
                      ✏️ Completar y activar
                    </button>
                    <button onClick={()=>rechazarBorrador(b.id)}
                      style={{background:"#FEF2F2",color:"#EF4444",border:"1px solid #FECACA",borderRadius:7,padding:"8px 14px",fontSize:12,cursor:"pointer",fontWeight:600}}>
                      🗑 Eliminar
                    </button>
                  </div>
                </div>

            </div>
          )}

          {/* Info del link */}
          <div style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:10,padding:"14px",marginTop:16}}>

            </div>
            <button onClick={()=>{navigator.clipboard.writeText(window.location.origin+"/formulario.html");showToast("Link copiado ✓");}}
              style={{marginTop:8,background:"#1E40AF",color:"#fff",border:"none",borderRadius:7,padding:"7px 14px",fontSize:12,cursor:"pointer",fontWeight:600}}>
              📋 Copiar link
            </button>
          </div>
        </div>
      </div>
    )}

    {/* MODAL DASHBOARD */}
    {showDashboard&&(
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16,overflowY:"auto"}}>
        <div style={{background:"#F1F5F9",borderRadius:16,width:"100%",maxWidth:700,padding:24,boxShadow:"0 20px 60px rgba(0,0,0,0.2)",maxHeight:"92vh",overflowY:"auto"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
            <div>
              <h2 style={{margin:0,fontSize:19,fontWeight:800,color:"#0F172A"}}>📊 Dashboard</h2>

            </div>
            <button onClick={()=>setShowDashboard(false)} style={{background:"#E2E8F0",border:"none",borderRadius:8,padding:"8px 14px",fontSize:13,cursor:"pointer",fontWeight:600,color:"#374151"}}>Cerrar ✕</button>
          </div>

          {/* ALERTAS */}
          {(stats.alertas.length>0||stats.vencidos.length>0)&&(

                  <div style={{fontSize:12,fontWeight:700,color:"#DC2626",marginBottom:6}}>🔴 {stats.vencidos.length} cliente{stats.vencidos.length!==1?"s":""} con fecha vencida</div>
                  {stats.vencidos.slice(0,3).map(c=><div key={c.id} style={{fontSize:12,color:"#374151",padding:"3px 0",borderBottom:"1px dashed #FECACA"}}>• {c.nombre} — {fmt(getProximaFecha(c))}</div>)}
                  {stats.vencidos.length>3&&<div style={{fontSize:11,color:"#94A3B8",marginTop:4}}>...y {stats.vencidos.length-3} más</div>}
                </div>
              )}
              {stats.alertas.length>0&&(
                <div style={{background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:9,padding:"10px 14px"}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#D97706",marginBottom:6}}>🟡 {stats.alertas.length} cliente{stats.alertas.length!==1?"s":""} con fecha en los próximos 7 días</div>
                  {stats.alertas.map(c=>{const pf=getProximaFecha(c);const dias=getDias(pf);return(<div key={c.id} style={{fontSize:12,color:"#374151",padding:"3px 0",borderBottom:"1px dashed #FDE68A",display:"flex",justifyContent:"space-between"}}>
                    <span>• {c.nombre}</span>
                    <span style={{fontWeight:600,color:"#D97706"}}>{fmt(pf)} — En {dias}d</span>
                  </div>);})}
                </div>
              )}
            </div>
          )}

          {/* ESTADÍSTICAS GENERALES */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:10,marginBottom:16}}>
            {[
              {label:"Total clientes",value:clientes.length,icon:"👥",color:"#1E40AF",bg:"#EFF6FF"},
              {label:"EOIR activos",value:clientes.filter(c=>(c.casos||[]).some(ca=>ca.sistema==="eoir")).length,icon:"⚖️",color:"#7C3AED",bg:"#F5F3FF"},
              {label:"USCIS activos",value:clientes.filter(c=>(c.casos||[]).some(ca=>ca.sistema==="uscis")).length,icon:"🏛",color:"#0369A1",bg:"#F0F9FF"},
              {label:"FOIA activos",value:clientes.filter(c=>(c.casos||[]).some(ca=>ca.sistema==="foia")).length,icon:"📂",color:"#0891B2",bg:"#ECFEFF"},
              {label:"Elegibles EAD",value:stats.eadElegibles.length,icon:"✅",color:"#16A34A",bg:"#F0FDF4"},
              {label:"Fechas vencidas",value:stats.vencidos.length,icon:"🔴",color:"#DC2626",bg:"#FEF2F2"},
            ].map((s,i)=>(
              <div key={i} style={{background:s.bg,borderRadius:10,padding:"14px",textAlign:"center",border:`1px solid ${s.color}22`}}>
                <div style={{fontSize:24}}>{s.icon}</div>
                <div style={{fontSize:26,fontWeight:800,color:s.color,lineHeight:1,marginTop:4}}>{s.value}</div>
                <div style={{fontSize:11,color:"#64748B",marginTop:3}}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* REPORTE DE COBROS */}
          <div style={{background:"#fff",borderRadius:12,padding:"16px",marginBottom:16,border:"1px solid #E2E8F0"}}>
            <div style={{fontSize:13,fontWeight:700,color:"#0F172A",marginBottom:14}}>💰 Reporte de cobros</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
              <div style={{background:"#F0FDF4",borderRadius:9,padding:"12px",textAlign:"center",border:"1px solid #BBF7D0"}}>
                <div style={{fontSize:11,color:"#6B7280",textTransform:"uppercase",marginBottom:4}}>Total cobrado</div>
                <div style={{fontSize:18,fontWeight:800,color:"#16A34A"}}>{fmtMoney(stats.totalCobrado)}</div>
              </div>
              <div style={{background:"#FEF2F2",borderRadius:9,padding:"12px",textAlign:"center",border:"1px solid #FECACA"}}>
                <div style={{fontSize:11,color:"#6B7280",textTransform:"uppercase",marginBottom:4}}>Pendiente</div>
                <div style={{fontSize:18,fontWeight:800,color:"#DC2626"}}>{fmtMoney(stats.pendiente)}</div>
              </div>
              <div style={{background:"#EFF6FF",borderRadius:9,padding:"12px",textAlign:"center",border:"1px solid #BFDBFE"}}>
                <div style={{fontSize:11,color:"#6B7280",textTransform:"uppercase",marginBottom:4}}>Total facturado</div>
                <div style={{fontSize:18,fontWeight:800,color:"#1E40AF"}}>{fmtMoney(stats.totalCobrar)}</div>
              </div>
            </div>
            {/* Barra general */}
            <div style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:12,color:"#64748B"}}>Progreso de cobros</span>
                <span style={{fontSize:12,fontWeight:700,color:"#16A34A"}}>{stats.totalCobrar>0?Math.round((stats.totalCobrado/stats.totalCobrar)*100):0}%</span>
              </div>
              <div style={{background:"#E2E8F0",borderRadius:20,height:10,overflow:"hidden"}}>
                <div style={{height:"100%",borderRadius:20,background:"#16A34A",width:`${stats.totalCobrar>0?Math.min(100,Math.round((stats.totalCobrado/stats.totalCobrar)*100)):0}%`}}/>
              </div>
            </div>
            {/* Detalle */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              <div style={{background:"#F0FDF4",borderRadius:8,padding:"10px",textAlign:"center"}}>
                <div style={{fontSize:20,fontWeight:700,color:"#16A34A"}}>{stats.pagadoCompleto.length}</div>
                <div style={{fontSize:11,color:"#6B7280"}}>✅ Pagado completo</div>
              </div>
              <div style={{background:"#FFFBEB",borderRadius:8,padding:"10px",textAlign:"center"}}>
                <div style={{fontSize:20,fontWeight:700,color:"#D97706"}}>{stats.conSaldo.length}</div>
                <div style={{fontSize:11,color:"#6B7280"}}>⏳ Con saldo pendiente</div>
              </div>
              <div style={{background:"#FEF2F2",borderRadius:8,padding:"10px",textAlign:"center"}}>
                <div style={{fontSize:20,fontWeight:700,color:"#DC2626"}}>{stats.sinPago.length}</div>
                <div style={{fontSize:11,color:"#6B7280"}}>🔴 Sin pago registrado</div>
              </div>
            </div>
          </div>

          {/* ELEGIBLES EAD */}
          {stats.eadElegibles.length>0&&(
            <div style={{background:"#fff",borderRadius:12,padding:"16px",border:"1px solid #E2E8F0"}}>
              <div style={{fontSize:13,fontWeight:700,color:"#0F172A",marginBottom:10}}>✅ Elegibles para EAD (180+ días)</div>
              {stats.eadElegibles.map(c=>{
                const casoAsilo=(c.casos||[]).find(ca=>ca.fechaAsilo);
                const dias=casoAsilo?Math.floor((new Date()-new Date(casoAsilo.fechaAsilo+"T00:00:00"))/86400000):0;
                return(<div key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px dashed #E2E8F0"}}>
                  <span style={{fontSize:13,color:"#0F172A",fontWeight:500}}>{c.nombre}</span>
                  <span style={{fontSize:12,fontWeight:700,color:"#16A34A",background:"#F0FDF4",borderRadius:20,padding:"2px 10px"}}>✅ {dias} días</span>
                </div>);
              })}
            </div>
          )}
        </div>
      </div>
    )}

    {/* MODAL EQUIPO */}
    {showTeam&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16}}>
      <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:420,padding:28,boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
        <h2 style={{margin:"0 0 6px",fontSize:17,fontWeight:700}}>👥 Equipo</h2>
        <p style={{fontSize:13,color:"#64748B",margin:"0 0 16px"}}>Nombres para asignar a casos</p>
        <div style={{display:"flex",gap:8,marginBottom:12}}>
          <input value={newMember} onChange={e=>setNewMember(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addMember()} placeholder="Nombre..." style={{flex:1,padding:"9px 12px",borderRadius:8,border:"1px solid #D1D5DB",fontSize:14,outline:"none"}}/>
          <button onClick={addMember} style={{padding:"9px 16px",borderRadius:8,border:"none",background:"#1E40AF",color:"#fff",fontWeight:600,fontSize:14,cursor:"pointer"}}>+ Agregar</button>
        </div>
        <div style={{display:"grid",gap:8,marginBottom:16,maxHeight:220,overflowY:"auto"}}>
          {equipo.length===0?<div style={{textAlign:"center",padding:16,color:"#94A3B8",fontSize:13}}>Sin miembros aún</div>:equipo.map((m,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#F8FAFC",borderRadius:8,padding:"9px 13px",border:"1px solid #E2E8F0"}}>
              <span style={{fontWeight:500}}>👩 {m}</span>
              <button onClick={()=>removeMember(i)} style={{background:"#FEF2F2",color:"#EF4444",border:"1px solid #FECACA",borderRadius:6,padding:"4px 9px",fontSize:12,cursor:"pointer"}}>Eliminar</button>
            </div>
          ))}
        </div>
        <button onClick={()=>setShowTeam(false)} style={{width:"100%",padding:"10px",borderRadius:8,border:"1px solid #D1D5DB",background:"#fff",fontSize:14,cursor:"pointer",fontWeight:600}}>Cerrar</button>
      </div>
    </div>)}

    {/* MODAL PDF */}
    {showPDF&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16}}>
      <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:420,padding:28,boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
        <h2 style={{margin:"0 0 6px",fontSize:17,fontWeight:700}}>📄 Descargar PDF</h2>
        <p style={{fontSize:13,color:"#64748B",margin:"0 0 16px"}}>Elige qué clientes incluir</p>
        <div style={{marginBottom:14}}><label style={{display:"block",fontSize:12,fontWeight:600,color:"#374151",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.04em"}}>Sistema</label>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:7}}>{[["todos","🗂 Todos"],["eoir","⚖️ EOIR"],["uscis","🏛 USCIS"],["foia","📂 FOIA"]].map(([k,l])=>(<button key={k} onClick={()=>setPdfOpts(p=>({...p,sistema:k}))} style={{padding:"8px 4px",borderRadius:8,border:pdfOpts.sistema===k?"2px solid #1E40AF":"2px solid #E5E7EB",background:pdfOpts.sistema===k?"#EFF6FF":"#fff",color:pdfOpts.sistema===k?"#1E40AF":"#374151",fontWeight:pdfOpts.sistema===k?700:400,fontSize:11,cursor:"pointer"}}>{l}</button>))}</div>
        </div>
        <div style={{marginBottom:16}}><label style={{display:"block",fontSize:12,fontWeight:600,color:"#374151",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.04em"}}>Estado</label>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}}>{[["todos","Todos"],["vencido","🔴 Vencidas"],["urgente","🟡 Urgentes"],["hoy","🟠 Hoy"],["proximo","🔵 Próximas"],["ok","🟢 Al día"]].map(([k,l])=>(<button key={k} onClick={()=>setPdfOpts(p=>({...p,estado:k}))} style={{padding:"7px 4px",borderRadius:8,border:pdfOpts.estado===k?"2px solid #1E40AF":"2px solid #E5E7EB",background:pdfOpts.estado===k?"#EFF6FF":"#fff",color:pdfOpts.estado===k?"#1E40AF":"#374151",fontWeight:pdfOpts.estado===k?700:400,fontSize:11,cursor:"pointer"}}>{l}</button>))}</div>
        </div>
        <div style={{background:"#F8FAFC",borderRadius:8,padding:"9px 13px",marginBottom:16,fontSize:13,color:"#475569"}}>📋 <strong>{filtered.length}</strong> clientes en el reporte</div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button onClick={()=>setShowPDF(false)} style={{padding:"9px 20px",borderRadius:8,border:"1px solid #D1D5DB",background:"#fff",color:"#374151",fontSize:14,cursor:"pointer"}}>Cancelar</button>
          <button onClick={generatePDF} style={{padding:"9px 20px",borderRadius:8,border:"none",background:"#1E40AF",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer"}}>📥 Generar PDF</button>
        </div>
      </div>
    </div>)}

    {/* MODAL USUARIOS */}
    {showAddUser&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16}}>
      <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:400,padding:28,boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
        <h2 style={{margin:"0 0 6px",fontSize:17,fontWeight:700}}>🔐 Agregar usuario</h2>
        <p style={{fontSize:13,color:"#64748B",margin:"0 0 16px"}}>Acceso al sistema para tu equipo</p>
        <Field label="Email" value={newUserEmail} onChange={setNewUserEmail} placeholder="usuario@email.com" type="email"/>
        <Field label="Contraseña temporal" value={newUserPass} onChange={setNewUserPass} placeholder="Mínimo 6 caracteres" type="password"/>
        {addUserMsg&&<div style={{padding:"9px 13px",borderRadius:8,background:addUserMsg.includes("✅")?"#F0FDF4":"#FEF2F2",border:`1px solid ${addUserMsg.includes("✅")?"#BBF7D0":"#FECACA"}`,fontSize:13,color:addUserMsg.includes("✅")?"#15803D":"#DC2626",marginBottom:14}}>{addUserMsg}</div>}
        <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
          <button onClick={()=>{setShowAddUser(false);setAddUserMsg("");setNewUserEmail("");setNewUserPass("");}} style={{padding:"9px 20px",borderRadius:8,border:"1px solid #D1D5DB",background:"#fff",color:"#374151",fontSize:14,cursor:"pointer"}}>Cerrar</button>
          <button onClick={handleAddUser} style={{padding:"9px 20px",borderRadius:8,border:"none",background:"#1E40AF",color:"#fff",fontSize:14,fontWeight:600,cursor:"pointer"}}>Crear usuario</button>
        </div>
      </div>
    </div>)}

    {/* CONFIRMAR ELIMINAR */}
    {confirmDelete&&(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100}}>
      <div style={{background:"#fff",borderRadius:14,width:340,padding:28,textAlign:"center",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>
        <div style={{fontSize:40}}>🗑️</div><h3 style={{margin:"10px 0 6px",color:"#0F172A"}}>¿Eliminar este cliente?</h3>
        <p style={{color:"#EF4444",fontSize:12,fontWeight:600,margin:"0 0 22px"}}>⚠️ Se eliminarán todos sus casos y datos. No se puede deshacer.</p>
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          <button onClick={()=>setConfirmDelete(null)} style={{padding:"9px 22px",borderRadius:8,border:"1px solid #D1D5DB",background:"#fff",cursor:"pointer"}}>Cancelar</button>
          <button onClick={()=>handleDelete(confirmDelete)} style={{padding:"9px 22px",borderRadius:8,border:"none",background:"#EF4444",color:"#fff",cursor:"pointer",fontWeight:600}}>Sí, eliminar</button>
        </div>
      </div>
    </div>)}

    {/* TOAST */}
    {toast&&<div style={{position:"fixed",bottom:24,right:24,background:toast.type==="error"?"#EF4444":"#0F172A",color:"#fff",padding:"11px 18px",borderRadius:10,fontSize:14,fontWeight:500,boxShadow:"0 4px 20px rgba(0,0,0,0.2)",zIndex:200}}>{toast.msg}</div>}
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
