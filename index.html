//  Helpers 
function getStatus(f){if(!f)return"pendiente";const h=new Date();h.setHours(0,0,0,0);const d=Math.round((new Date(f+"T00:00:00")-h)/86400000);if(d<0)return"vencido";if(d===0)return"hoy";if(d<=3)return"urgente";if(d<=14)return"proximo";return"ok";}
function getDias(f){if(!f)return null;const h=new Date();h.setHours(0,0,0,0);return Math.round((new Date(f+"T00:00:00")-h)/86400000);}
function fmt(f){if(!f)return"—";const[y,m,d]=f.split("-");return`${m}/${d}/${y}`;}
function fmtA(a){const c=(a||"").replace(/\D/g,"").slice(0,9);if(c.length<=3)return c;if(c.length<=6)return c.slice(0,3)+"-"+c.slice(3);return c.slice(0,3)+"-"+c.slice(3,6)+"-"+c.slice(6);}
function eoirUrl(a){return`https://acis.eoir.justice.gov/en/CaseInformation?caseNumber=${(a||"").replace(/\D/g,"")}`;}
function uscisUrl(r){return`https://egov.uscis.gov/casestatus/mycasestatus.do?appReceiptNum=${(r||"").replace(/\s/g,"")}`;}
function fmtMoney(v){if(!v&&v!==0)return"";const n=parseFloat(v.toString().replace(/[^0-9.]/g,""));if(isNaN(n))return"";return"$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}
function parseMoney(v){return parseFloat((v||"0").toString().replace(/[^0-9.]/g,""))||0;}
function getPct(total,pagado){if(!total)return null;return Math.min(100,Math.round((pagado/total)*100));}
function pagoColor(pct){if(pct===null)return"#6B7280";if(pct>=100)return"#16A34A";if(pct>=50)return"#D97706";return"#DC2626";}
function getTotalProcesos(procesos){return(procesos||[]).reduce((s,p)=>s+parseMoney(p.precio),0);}
function getTotalPagado(procesos){return(procesos||[]).reduce((s,p)=>s+parseMoney(p.pagado),0);}
function getWPTotal(ca){return((ca&&ca.wpDependientes)||[]).reduce((s,w)=>s+parseMoney(w.precio),0);}
function getWPPagado(ca){return((ca&&ca.wpDependientes)||[]).reduce((s,w)=>s+parseMoney(w.pagado),0);}
function getPróximaFecha(cliente){const fechas=[];(cliente.casos||[]).forEach(c=>{if(c.fechaCorte)fechas.push(c.fechaCorte);if(c.fechaHuellas)fechas.push(c.fechaHuellas);});if(!fechas.length)return null;const hoy=new Date();hoy.setHours(0,0,0,0);const futuras=fechas.filter(f=>new Date(f+"T00:00:00")>=hoy).sort();if(futuras.length)return futuras[0];return fechas.sort().reverse()[0];}
function getStatusCliente(cliente){if(cliente.deportado===true)return"deportado";const pf=getPróximaFecha(cliente);if(!pf)return"pendiente";return getStatus(pf);}

//  Editor de procesos de pago 
function ProcesosEditor({procesos,onChange}){
  const add=()=>onChange([...procesos,{nombre:"",precio:"",pagado:"",notas:"",id:Date.now()}]);
  const upd=(i,f,v)=>{const n=[...procesos];n[i]={...n[i],[f]:v};onChange(n);};
  const del=(i)=>onChange(procesos.filter((_,idx)=>idx!==i));
  const total=getTotalProcesos(procesos);const pagado=getTotalPagado(procesos);const pct=getPct(total,pagado);const pc=pagoColor(pct);
  return(<div style={{background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:8,padding:"12px",marginBottom:10}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <div style={{fontSize:12,fontWeight:700,color:"#D97706"}}>💰 Pagos de este proceso</div>
      <button onClick={add} style={{background:"#1E40AF",color:"#fff",border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",fontWeight:600}}>+ Agregar pago</button>
    </div>
    {procesos.length===0&&<div style={{fontSize:11,color:"#94A3B8",textAlign:"center",padding:"6px 0"}}>Sin pagos registrados</div>}
    {procesos.map((p,i)=>(
      <div key={p.id||i} style={{background:"#fff",borderRadius:7,padding:"9px 11px",marginBottom:7,border:"1px solid #FDE68A"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
          <select value={p.nombre} onChange={e=>upd(i,"nombre",e.target.value)} style={{flex:1,padding:"6px 8px",borderRadius:6,border:"1px solid #D1D5DB",fontSize:12,background:"#fff",cursor:"pointer",marginRight:8}}>
            <option value="">Seleccionar proceso...</option>{PROCESOS_COMUNES.map(pc=><option key={pc} value={pc}>{pc}</option>)}
          </select>
          <button onClick={()=>del(i)} style={{background:"#FEF2F2",color:"#EF4444",border:"1px solid #FECACA",borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:6}}>
          <div><label style={{display:"block",fontSize:10,fontWeight:600,color:"#374151",marginBottom:2,textTransform:"uppercase"}}>Precio</label><input value={p.precio} onChange={e=>upd(i,"precio",e.target.value)} placeholder="Ej. 2500" style={{width:"100%",padding:"6px 8px",borderRadius:6,border:"1px solid #D1D5DB",fontSize:12,outline:"none"}}/></div>
          <div><label style={{display:"block",fontSize:10,fontWeight:600,color:"#374151",marginBottom:2,textTransform:"uppercase"}}>Pagado</label><input value={p.pagado} onChange={e=>upd(i,"pagado",e.target.value)} placeholder="Ej. 1000" style={{width:"100%",padding:"6px 8px",borderRadius:6,border:"1px solid #D1D5DB",fontSize:12,outline:"none"}}/></div>
        </div>
        {p.precio&&<><div style={{background:"#E2E8F0",borderRadius:20,height:4}}><div style={{height:"100%",borderRadius:20,background:pagoColor(getPct(parseMoney(p.precio),parseMoney(p.pagado))),width:`${getPct(parseMoney(p.precio),parseMoney(p.pagado))||0}%`}}/></div><div style={{fontSize:10,color:pagoColor(getPct(parseMoney(p.precio),parseMoney(p.pagado))),fontWeight:700,marginTop:2}}>{fmtMoney(p.pagado)||"$0"} / {fmtMoney(p.precio)} — {getPct(parseMoney(p.precio),parseMoney(p.pagado))||0}%</div></>}
        <input value={p.notas||""} onChange={e=>upd(i,"notas",e.target.value)} placeholder="Notas de pago..." style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid #E2E8F0",fontSize:11,outline:"none",marginTop:6}}/>
      </div>
    ))}
    {procesos.length>0&&<div style={{background:"#FEF9C3",borderRadius:7,padding:"8px 11px",border:"1px solid #FDE68A"}}>
      <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:11,fontWeight:700,color:"#92400E"}}>Total</span><span style={{fontSize:12,fontWeight:800,color:"#92400E"}}>{fmtMoney(pagado)} / {fmtMoney(total)}</span></div>
      <div style={{background:"#E2E8F0",borderRadius:20,height:5,marginTop:4}}><div style={{height:"100%",borderRadius:20,background:pc,width:`${pct||0}%`}}/></div>
      <div style={{fontSize:10,color:pc,fontWeight:700,marginTop:2}}>{pct!==null?`${pct}% — Saldo: ${fmtMoney(total-pagado)}`:"Sin info"}</div>
    </div>}
  </div>);
}

function LoginScreen({onLogin}){
  const[email,setEmail]=useState("");const[pw,setPw]=useState("");const[err,setErr]=useState("");const[loading,setLoading]=useState(false);
  const[loginLogo,setLoginLogo]=useState(window._officeLogo||null);
  const[loginName,setLoginName]=useState(window._officeName||null);
  useEffect(()=>{
    window._forceLoginUpdate=()=>{setLoginLogo(window._officeLogo||null);setLoginName(window._officeName||null);};
    return()=>{window._forceLoginUpdate=null;};
  },[]);
  const login=async()=>{if(!email||!pw){setErr("Ingresa tu email y contraseña");return;}setLoading(true);setErr("");
    try{
      const{auth,signInWithEmailAndPassword,db,doc,getDoc}=window._firebase;
      const cred=await signInWithEmailAndPassword(auth,email,pw);
      // Monitor personal — no requiere colección users en Firestore
      const userData={role:"office_admin",officeId:"personal",displayName:cred.user.email};
      const officeInfo={id:"personal",name:"Mi Oficina",plan:"premium",enabledModules:["immigration","verificadorUSCIS","controlEnvios"]};
      // Registrar actividad de login
      try{
        const{collection:colA,addDoc:addA}=window._firebase;
        await addA(colA(db,"actividadEmpleadas"),{
          officeId:userData.officeId||"",
          usuario:cred.user.email,
          tipo:"login",
          detalle:"Inició sesión",
          fecha:new Date().toISOString(),
        });
      }catch(ae){console.error("Error registrando login:",ae);}
      onLogin(cred.user,userData,officeInfo);
    }catch(e){setErr("Email o contraseña incorrectos");}setLoading(false);};
  return(<div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0F172A 0%,#1E40AF 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:400,padding:36,boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{marginBottom:12,display:"flex",justifyContent:"center"}}>
          {loginLogo
            ?<img src={loginLogo} alt="Logo" style={{height:70,maxWidth:220,objectFit:"contain",borderRadius:10}}/>
            :<div style={{fontSize:48}}>⚖️</div>
          }
        </div>
        <h1 style={{fontSize:22,fontWeight:800,color:"#0F172A",margin:0}}>{loginName||t("Monitor de Inmigración","Immigration Monitor")}</h1>
        <p style={{fontSize:13,color:"#64748B",marginTop:6}}>{t("Ingresa con tu cuenta para continuar","Sign in to continue")}</p>
      </div>
      <div style={{marginBottom:14}}><label style={{display:"block",fontSize:12,fontWeight:600,color:"#374151",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.04em"}}>{t("Email","Email")}</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="tu@email.com" onKeyDown={e=>e.key==="Enter"&&login()} style={{width:"100%",padding:"11px 13px",borderRadius:8,border:"1px solid #D1D5DB",fontSize:14,outline:"none"}}/></div>
      <div style={{marginBottom:20}}><label style={{display:"block",fontSize:12,fontWeight:600,color:"#374151",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.04em"}}>{t("Contraseña","Password")}</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&login()} style={{width:"100%",padding:"11px 13px",borderRadius:8,border:"1px solid #D1D5DB",fontSize:14,outline:"none"}}/></div>
      {err&&<div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#DC2626",marginBottom:16}}>⚠️ {err}</div>}
      <button onClick={login} disabled={loading} style={{width:"100%",padding:"12px",borderRadius:9,border:"none",background:loading?"#E5E7EB":"#1E40AF",color:loading?"#9CA3AF":"#fff",fontSize:15,fontWeight:700,cursor:loading?"not-allowed":"pointer"}}>{loading ? t("Ingresando...","Signing in...") : t("Ingresar →","Sign in →")}</button>
    </div></div>);
}

      const dbJ = window._dbPlatform;
      const snap = await getDocs(query(collection(dbJ,"jotform_submissions"),ob("createdAt","desc")));
      const saved = snap.docs.map(d=>{
        const data = d.data();
        // _i589mapped puede llegar como string JSON — parsearlo si es necesario
        if(data._i589mapped && typeof data._i589mapped === 'string'){
          try{ data._i589mapped = JSON.parse(data._i589mapped); }catch(e){}
        }
        // nombre puede estar vacío — intentar reconstruirlo desde _i589mapped
        if((!data.nombre||data.nombre.trim()==='') && data._i589mapped){
          const m = data._i589mapped;
          data.nombre = ((m.nombre||'') + ' ' + (m.apellido||'')).trim();
        }
        if(!data.telefono && data._i589mapped){
          data.telefono = data._i589mapped.telefono||'';
        }
        return {id:d.id,...data};
      });

      // También llamar a la API de Jotform si hay API key
      let apiSubs = [];
      if(JOTFORM_API_KEY){
        const r = await fetch(
          `https://api.jotform.com/form/${JOTFORM_FORM_ID}/submissions?apiKey=${JOTFORM_API_KEY}&limit=100&orderby=created_at,DESC`,
          { headers:{"Content-Type":"application/json"} }
        );
        const data = await r.json();
        if(data.content && Array.isArray(data.content)){
          apiSubs = data.content.map(s => {
            const mapped = mapJotformToI589(s.answers||{});
            return {
              _subId: s.id,
              _createdAt: s.created_at,
              _answers: s.answers,
              _i589mapped: mapped,
              _status: "nueva",
              nombre: mapped.nombre + " " + mapped.apellido,
              telefono: mapped.telefono,
              fecha: s.created_at,
            };
          });
        }
      }

      // Combinar: si ya está en Firestore, usar Firestore; si no, usar API
      const savedIds = new Set(saved.map(s=>s._subId));
      const combined = [
        ...saved,
        ...apiSubs.filter(s=>!savedIds.has(s._subId))
      ];
      setJotformSubs(combined);
      const nuevas = combined.filter(s=>(!s._status||s._status==="nueva")).length;
      setJotformPendientes(nuevas);
    } catch(e) {
      console.error("loadJotformSubs error:", e);
      setJotformError("Error cargando submissions: " + e.message);
    }
    setJotformLoading(false);
  };

const assignExpedientes=async()=>{
  try{
    const{db,collection,getDocs,query,where,updateDoc,doc}=window._firebase;
    const officeId=officeData?.id||userData?.officeId;
    // No orderBy to avoid composite index requirement — sort in JS
    let q;
    if(officeId){
      q=query(collection(db,"clientes"),where("officeId","==",officeId));
    }else{
      q=collection(db,"clientes");
    }
    const snap=await getDocs(q);
    // Sort by createdAt in JS
    const sorted=snap.docs.slice().sort((a,b)=>{
      const fa=a.data().createdAt||"";
      const fb=b.data().createdAt||"";
      return fa.localeCompare(fb);
    });
    // Find current max exp number
    let maxNum=sorted.reduce((max,d)=>{
      const n=parseInt((d.data().expediente||"").replace("EXP-",""))||0;
      return n>max?n:max;
    },0);
    // Assign only to those without expediente
    const sinExp=sorted.filter(d=>!d.data().expediente);
    for(const d of sinExp){
      maxNum++;
      const expNum="EXP-"+String(maxNum).padStart(4,"0");
      await updateDoc(doc(db,"clientes",d.id),{expediente:expNum});
    }
    await loadCases();
    showToastFn(`Expedientes asignados — ${sinExp.length} clientes actualizados ✓`);
  }catch(e){console.error("assignExpedientes error:",e);showToastFn("Error: "+e.message,"error");}
};

      const diaInicio=new Date(actividadFecha+"T00:00:00").toISOString();

      // 1. Eventos de login del día
      let loginEvents=[];

        const qLogin=query(collection(db,"actividadEmpleadas"),where("officeId","==",officeId));
        const snapLogin=await getDocs(qLogin);
        loginEvents=snapLogin.docs.map(d=>({id:d.id,...d.data()}))
          .filter(ev=>ev.fecha>=diaInicio&&ev.fecha<=diaFin)
          .map(ev=>({tipo:"login",usuario:ev.usuario,detalle:ev.detalle||"Inició sesión",fecha:ev.fecha,icono:"🔓"}));
      }catch(e){console.error("loadActividad login error:",e);}

      // 2. Cambios en clientes (historial) — filtrar por oficina y por fecha
      let historialEvents=[];
      try{
        const qHist=query(collection(db,"historial"),where("officeId","==",officeId));
        const snapHist=await getDocs(qHist);
        historialEvents=snapHist.docs.map(d=>({id:d.id,...d.data()}))
          .filter(ev=>ev.fecha>=diaInicio&&ev.fecha<=diaFin)
          .map(ev=>({
            tipo:"cambio",
            usuario:ev.usuarioEmail||ev.usuario||"",
            detalle:ev.accion||(ev.cambios&&ev.cambios.length>0?ev.cambios[0].texto:"Cambio realizado"),
            clienteId:ev.clienteId,
            fecha:ev.fecha,
            icono:"✏️",
          }));
      }catch(e){console.error("loadActividad historial error:",e);}

      // 3. Estado online (heartbeats recientes)
      let onlineList=[];
      try{
        const qOnline=query(collection(db,"actividadOnline"),where("officeId","==",officeId));
        const snapOnline=await getDocs(qOnline);
        onlineList=snapOnline.docs.map(d=>({id:d.id,...d.data()}));
      }catch(e){console.error("loadActividad online error:",e);}

      const allEvents=[...loginEvents,...historialEvents].sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));

  const handleSubmit=async()=>{
    if(!formCliente.nombre)return;setSaving(true);
    const officeId=officeData?.id||userData?.officeId||"";

    try{
      const{db,collection,addDoc,doc,updateDoc}=window._firebase;

        const prevCliente = clientes.find(c=>c.id===editId)||{};
        await updateDoc(doc(db,"clientes",editId),{...formCliente,officeId,updatedAt:new Date().toISOString(),updatedBy:user.email});
        // Guardar en historial (con try/catch para no romper el guardado)
        try{
          const cambios=[];
          const usuario=userData?.displayName||user.email;
          const fmtFecha=(f)=>f?new Date(f+"T00:00:00").toLocaleDateString("es-US",{day:"2-digit",month:"short",year:"numeric"}):"—";
          // Datos del cliente
          if(prevCliente.nombre!==formCliente.nombre) cambios.push({icono:"✏️",texto:`Nombre: "${prevCliente.nombre||"—"}" → "${formCliente.nombre}"`});
          if(prevCliente.alienNum!==formCliente.alienNum) cambios.push({icono:"🪪",texto:`A#: ${prevCliente.alienNum||"—"} → ${formCliente.alienNum||"—"}`});
          if(prevCliente.encargada!==formCliente.encargada) cambios.push({icono:"👤",texto:`Encargada: ${prevCliente.encargada||"Sin asignar"} → ${formCliente.encargada||"Sin asignar"}`});
          if(prevCliente.telefono!==formCliente.telefono) cambios.push({icono:"📱",texto:`Teléfono: ${prevCliente.telefono||"—"} → ${formCliente.telefono||"—"}`});
          if(prevCliente.paisOrigen!==formCliente.paisOrigen) cambios.push({icono:"🌍",texto:`País: ${prevCliente.paisOrigen||"—"} → ${formCliente.paisOrigen||"—"}`});
          // Casos
          const casosNew=formCliente.casos||[];
          const casosOld=prevCliente.casos||[];
          if(casosNew.length>casosOld.length) cambios.push({icono:"📁",texto:`Nuevo caso agregado: ${casosNew[casosNew.length-1].tipoCaso||"Sin tipo"}`});
          if(casosNew.length<casosOld.length) cambios.push({icono:"🗑️",texto:`Caso eliminado`});
          casosNew.forEach((ca,i)=>{
            const prev=casosOld[i]||{};
            const label=ca.tipoCaso||`Caso ${i+1}`;
            if(prev.tipoCaso!==ca.tipoCaso&&ca.tipoCaso) cambios.push({icono:"📋",texto:`Tipo de caso: ${prev.tipoCaso||"—"} → ${ca.tipoCaso}`});
            if(prev.estatusCaso!==ca.estatusCaso&&ca.estatusCaso) cambios.push({icono:"🔄",texto:`[${label}] Estado: ${prev.estatusCaso||"—"} → ${ca.estatusCaso}`});
            if(prev.fechaCorte!==ca.fechaCorte&&ca.fechaCorte) cambios.push({icono:"📅",texto:`[${label}] Fecha de corte: ${fmtFecha(prev.fechaCorte)} → ${fmtFecha(ca.fechaCorte)}`});
            if(prev.fechaHuellas!==ca.fechaHuellas&&ca.fechaHuellas) cambios.push({icono:"📅",texto:`[${label}] Biométricos: ${fmtFecha(prev.fechaHuellas)} → ${fmtFecha(ca.fechaHuellas)}`});
            if(prev.fechaAsilo!==ca.fechaAsilo&&ca.fechaAsilo) cambios.push({icono:"📅",texto:`[${label}] Fecha asilo: ${fmtFecha(prev.fechaAsilo)} → ${fmtFecha(ca.fechaAsilo)}`});
            if(prev.receiptNum!==ca.receiptNum&&ca.receiptNum) cambios.push({icono:"🧾",texto:`[${label}] N° Recibo: ${prev.receiptNum||"—"} → ${ca.receiptNum}`});
            if(prev.alienNum!==ca.alienNum&&ca.alienNum) cambios.push({icono:"🪪",texto:`[${label}] A#: ${prev.alienNum||"—"} → ${ca.alienNum}`});
            if(prev.foiaTracking!==ca.foiaTracking&&ca.foiaTracking) cambios.push({icono:"📂",texto:`[${label}] FOIA Tracking: ${prev.foiaTracking||"—"} → ${ca.foiaTracking}`});
            if(prev.foiaEstado!==ca.foiaEstado&&ca.foiaEstado) cambios.push({icono:"📂",texto:`[${label}] Estado FOIA: ${prev.foiaEstado||"—"} → ${ca.foiaEstado}`});
            if(prev.nota!==ca.nota&&ca.nota) cambios.push({icono:"📝",texto:`[${label}] Notas actualizadas`});
            // Pagos/procesos
            const procNew=ca.procesos||[];
            const procOld=prev.procesos||[];
            if(procNew.length>procOld.length) cambios.push({icono:"💵",texto:`[${label}] Nuevo pago agregado: ${procNew[procNew.length-1].nombre||""}`});
            procNew.forEach((p,pi)=>{
              const pp=procOld[pi]||{};
              if(pp.pagado!==p.pagado&&p.pagado) cambios.push({icono:"💵",texto:`[${label}] Pago "${p.nombre||"—"}": $${pp.pagado||0} → $${p.pagado}`});
            });
          });
          if(cambios.length>0){
            await addDoc(collection(db,"historial"),{
              clienteId:editId,officeId,
              cambios,

      }else{
        //  MULTI-OFFICE: always save officeId 
        const encargadaAuto = formCliente.encargada || userData?.displayName || user.email || "";
        // Get next expediente number
        let nextExp="EXP-0001";
        try{
          const{getDocs:gd,query:qq,where:ww,orderBy:oo}=window._firebase;
          const allSnap=await gd(officeId?qq(collection(db,"clientes"),ww("officeId","==",officeId)):collection(db,"clientes"));
          const maxN=allSnap.docs.reduce((max,d)=>{const n=parseInt((d.data().expediente||"").replace("EXP-",""))||0;return n>max?n:max;},0);
          nextExp="EXP-"+String(maxN+1).padStart(4,"0");
        }catch(ex){console.error(ex);}
        const ref=await addDoc(collection(db,"clientes"),{...formCliente,officeId,encargada:encargadaAuto,expediente:nextExp,createdAt:new Date().toISOString(),createdBy:user.email});
        try{await addDoc(collection(db,"historial"),{clienteId:ref.id,officeId,accion:"Cliente registrado",usuario:user.email,fecha:new Date().toISOString()});}catch(he){console.error(he);}
        setClientes(prev=>[{id:ref.id,...formCliente,officeId,encargada:encargadaAuto,expediente:nextExp,createdAt:new Date().toISOString()},...prev]);
        showToastFn("Cliente agregado ✓");

    setSaving(false);setShowModal(false);

        showToastFn(t("Envío actualizado ✓","Shipment updated ✓"));
      }else{
        const ref2=await addDoc(collection(db,"envios_tracking"),{officeId,tracking,metodo:envioForm.metodo,destinatario:destinatarioFinal,documentos:envioForm.documentos||"",estado:envioForm.estado,clienteId:envioForm.clienteId||"",clienteNombre:cliente?cliente.nombre:"",fechaEnvio:envioForm.fechaEnvio||"",fechaEntrega:envioForm.fechaEntrega||"",comprobanteUrl:"",comprobanteNombre:"",historial:[{estado:envioForm.estado,fecha:ahora,por}],createdAt:ahora,updatedAt:ahora,responsable:por});
        showToastFn(t("Envío guardado ✓","Shipment saved ✓"));
        setEnvioSelId(ref2.id);
      }

    if(!tel){showToastFn(t("El envío no tiene cliente vinculado con teléfono","Shipment has no linked client with phone"),"error");return;}
    const msg=encodeURIComponent(`Hola ${cliente.nombre}, le confirmamos que sus documentos (${envio.documentos||"paquete"}) fueron enviados a ${envio.destinatario} por ${envio.metodo}. Tracking: ${envio.tracking}. Estado actual: ${envio.estado}. — ${officeData?.name||""}`);

  };
  const abrirTrackingEnvio=(envio)=>{

    if(!envio||!archivo)return;
    const{storage,ref,uploadBytesResumable,getDownloadURL}=window._firebase;
    const officeId=officeData?.id||userData?.officeId||"";
    const path=`envios/${officeId}/${envio.id}/${Date.now()}_${archivo.name}`;
    const storageRef=ref(storage,path);
    setEnvioUploading(true);
    const task=uploadBytesResumable(storageRef,archivo);
    task.on("state_changed",null,
      err=>{showToastFn(t("Error al subir comprobante: ","Error uploading: ")+err.message,"error");setEnvioUploading(false);},
      async()=>{
        try{
          const url=await getDownloadURL(task.snapshot.ref);
          const{db,updateDoc,doc}=window._firebase;
          await updateDoc(doc(db,"envios_tracking",envio.id),{comprobanteUrl:url,comprobanteNombre:archivo.name,updatedAt:new Date().toISOString()});

                </>)}

                  <div style={{fontSize:13,fontWeight:700,color:"#0F172A",marginBottom:10}}>Revisión y cobro</div>

                    <option value="">Sin asignar</option>{equipo.map(m=><option key={m} value={m}>{m}</option>)}
                  </select>
                </>)}

              </div>

              <div style={{padding:"14px 24px 20px",borderTop:"1px solid #F1F5F9",display:"flex",justifyContent:"space-between"}}>
                <button onClick={()=>servicioStep===1?closeModal():setServicioStep(s=>s-1)} style={{padding:"9px 18px",borderRadius:8,border:"1px solid #D1D5DB",background:"#fff",fontSize:13,cursor:"pointer"}}>{servicioStep===1?"Cancelar":"← Atrás"}</button>
                {servicioStep<totalSteps?(
                  <button onClick={()=>setServicioStep(s=>s+1)} style={{padding:"9px 20px",borderRadius:8,border:"none",background:"#1E40AF",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>Siguiente →</button>
                ):(
                  <button disabled={servicioSaving} onClick={finalizarYCobrar} style={{padding:"9px 20px",borderRadius:8,border:"none",background:servicioSaving?"#94A3B8":"#16A34A",color:"#fff",fontSize:13,fontWeight:700,cursor:servicioSaving?"not-allowed":"pointer"}}>{servicioSaving?"Procesando...":"✅ Confirmar y generar PDF"}</button>
                )}
              </div>
            </>);
          })()}

        </div>
      </div>
    )}

        {toast&&<div style={{position:"fixed",bottom:24,right:24,background:toast.type==="error"?"#EF4444":"#0F172A",color:"#fff",padding:"11px 18px",borderRadius:10,fontSize:14,fontWeight:500,boxShadow:"0 4px 20px rgba(0,0,0,0.2)",zIndex:200}}>{toast.msg}</div>}
  </div>);
}

      {caso.sistema==="eoir"&&<div style={{marginBottom:10}}><label style={{display:"block",fontSize:11,fontWeight:600,color:"#374151",marginBottom:3,textTransform:"uppercase"}}>{t("Corte","Court")}</label><input value={caso.corte||""} onChange={e=>onChange({...caso,corte:e.target.value})} placeholder="Miami Immigration Court" style={{width:"100%",padding:"8px 10px",borderRadius:7,border:"1px solid #D1D5DB",fontSize:13,outline:"none"}}/></div>}

        {caso.tipoCita==="ambas"&&<><div style={{marginBottom:8}}><label style={{display:"block",fontSize:11,fontWeight:600,color:"#374151",marginBottom:3,textTransform:"uppercase"}}> Fecha Biométricos</label><input type="date" value={caso.fechaHuellas||""} onChange={e=>onChange({...caso,fechaHuellas:e.target.value})} style={{width:"100%",padding:"8px 10px",borderRadius:7,border:"1px solid #BFDBFE",fontSize:13,outline:"none"}}/></div><div style={{marginBottom:8}}><label style={{display:"block",fontSize:11,fontWeight:600,color:"#374151",marginBottom:3,textTransform:"uppercase"}}>🎤 Fecha de Entrevista</label><input type="date" value={caso.fechaCorte||""} onChange={e=>onChange({...caso,fechaCorte:e.target.value})} style={{width:"100%",padding:"8px 10px",borderRadius:7,border:"1px solid #BFDBFE",fontSize:13,outline:"none"}}/></div></>}

    {(caso.sistema==="uscis"&&(caso.tipoCaso||"").includes("I-589")||caso.sistema==="eoir"&&(caso.tipoCaso||"").toLowerCase().includes("asilo"))&&(

// Mapeo: pregunta Jotform → campo i589Draft de ImmigPath
function mapJotformToI589(answers) {
  // Helper principal — extrae el valor de una respuesta de Jotform
  const getVal = (v) => {
    if(!v) return "";
    const ans = v.answer;
    if(!ans && ans !== 0) return v.prettyFormat || "";
    if(typeof ans === "string") return ans;
    if(typeof ans === "number") return String(ans);
    if(typeof ans === "object"){
      // Teléfono: {full: "(305) 260-9874"}
      if(ans.full) return String(ans.full);
      // Nombre: {first: "Juan", last: "Lopez"}
      if(ans.first !== undefined || ans.last !== undefined)
        return [ans.first,ans.middle,ans.last].filter(Boolean).join(" ");
      // Dirección: {addr_line1, city, state, postal}
      if(ans.addr_line1 !== undefined)
        return [ans.addr_line1, ans.city, ans.state, ans.postal].filter(Boolean).join(", ");
      // Fecha: {month, day, year}
      if(ans.month !== undefined)
        return `${ans.month}/${ans.day}/${ans.year}`;
      // Fallback: unir valores
      return Object.values(ans).filter(Boolean).join(" ");
    }
    return v.prettyFormat || "";
  };

  // Buscar por texto de la pregunta (búsqueda parcial)
  const bl = (label) => {
    const lbl = label.toLowerCase().trim();
    const key = Object.keys(answers).find(k => {
      const txt = (answers[k]?.text||"").toLowerCase().trim();
      return txt === lbl || txt.includes(lbl);
    });
    return key ? getVal(answers[key]) : "";
  };

  // Buscar por orden numérico de campo (para campos con misma etiqueta repetida)
  const getByOrder = (label, index) => {
    const lbl = label.toLowerCase().trim();
    const matches = Object.keys(answers)
      .filter(k => (answers[k]?.text||"").toLowerCase().trim().includes(lbl))
      .sort((a,b) => parseInt(a)-parseInt(b));
    const key = matches[index];
    return key ? getVal(answers[key]) : "";
  };

  // ── Nombre completo ──
  const nombreRaw = bl("nombre completo");
  const partes = nombreRaw.trim().split(/\s+/);
  const nombre = partes.slice(0,-1).join(" ") || partes[0] || "";
  const apellido = partes.length > 1 ? partes[partes.length-1] : "";

  // ── Sexo ──
  const sexoRaw = (bl("que genero es usted")||"").toLowerCase();
  const sexo = sexoRaw.includes("masculino")||sexoRaw.includes("hombre") ? "M"
             : sexoRaw.includes("femenin")||sexoRaw.includes("mujer") ? "F" : "";

  // ── Estado civil ──
  const estadoCivilRaw = (bl("estatus matrimonial")||"").toLowerCase();
  const tieneConjuge = estadoCivilRaw.includes("casad") ? "si" : "no";
  const estadoCivilEn = estadoCivilRaw.includes("casad") ? "Married"
    : estadoCivilRaw.includes("solt") ? "Single"
    : estadoCivilRaw.includes("divorciad") ? "Divorced"
    : estadoCivilRaw.includes("viud") ? "Widowed" : "";

  // ── País y ciudad de nacimiento ──
  const paisCiudadRaw = bl("pais y ciudad donde nacio");
  const pcParts = paisCiudadRaw.split(/[,\s]+/).map(s=>s.trim()).filter(Boolean);
  const ciudadNac = pcParts[0] || "";
  const paisNac = pcParts[1] || pcParts[0] || "";

  // ── Dirección actual en EE.UU. ──
  const dirRaw = bl("direccion actual donde vive");

  // ── Pasaporte ──
  const pasaporte = bl("numero de pasaporte");

  // ── Hijos ──
  const tieneHijosRaw = (bl("tiene hijo")||"").toLowerCase();
  const tieneHijos = tieneHijosRaw.includes("si")||tieneHijosRaw.includes("sí") ? "si" : "no";

  // Hijos — los campos se repiten, usamos getByOrder
  const hijos = [];
  for(let i=0;i<3;i++){
    const hNombre = getByOrder("informacion hijo", i);
    const hDob = getByOrder("fecha de nacimiento", i+1); // índice +1 porque el 0 es el solicitante
    const hDonde = getByOrder("donde nacio", i);
    const hVive = getByOrder("donde vive actualmente", i);
    const hAlien = getByOrder("numero alien (si aplica)", i);
    const hIncluir = getByOrder("va hacer incluido", i);
    if(hNombre) hijos.push({
      nombre: hNombre.split(" ")[0]||"", apellido: hNombre.split(" ").slice(1).join(" ")||"",
      dob: hDob, ciudad: hDonde, nac: hDonde,
      enusa: hVive.toLowerCase().includes("usa")||hVive.toLowerCase().includes("united")?"si":"no",
      alien: hAlien, incluir: hIncluir.toLowerCase().includes("si")?"si":"no", sexo:""
    });
  }

  // ── Narrativa Q1 ──
  const q1 = bl("explique las razones por que usted salio") || bl("explique las razones");

  // ── Padres ──
  const madreNombre    = bl("nombre completo de su madre");
  const madreNac       = bl("donde nacio su madre");
  const madreUbicacion = bl("donde vive actualmente su madre");
  const padreNombre    = bl("nombre completo de su padre");
  const padreNac       = bl("donde nacio su padre");
  const padreUbicacion = bl("donde vive actualmente su padre");

  // ── Hermanos ──
  const h1 = bl("hermano (a) 1");
  const h2 = bl("hermano (a) 2");
  const h3 = bl("hermano (a) 3");
  const hermanos = [h1,h2,h3].filter(Boolean).join("\n");

  // ── Empleos ──
  const emp1n = bl("empleo 1 - nombre de la empresa");
  const emp1c = getByOrder("cargo", 0);
  const emp2n = bl("empleo 2 - nombre de la empresa");
  const emp3n = bl("empleo 3 - nombre de la empresa");
  const empleos = [
    emp1n&&emp1c?`${emp1n} — ${emp1c}`:emp1n,
    emp2n, emp3n
  ].filter(Boolean).join("\n");

  // ── Educación ──
  const edu1 = bl("nombre de la escuela primaria");
  const edu2 = bl("nombre de la escuela secundaria");
  const edu3 = bl("estudios adiciones - nombre de la institucion");
  const educacion = [edu1,edu2,edu3].filter(Boolean).join("\n");

  // ── Direcciones ──
  const dirOrigen = bl("direccion de su pais");
  const dirDesde  = getByOrder("fecha que comenzo a vivir", 0);
  const dirHasta  = getByOrder("fecha que dejo de vivir", 0);
  const dir2 = bl("informacion direccion  2") || getByOrder("direccion", 1);
  const dir3 = bl("informacion direccion  3") || getByOrder("direccion", 2);
  const residencias = [dirOrigen, dir2, dir3].filter(Boolean).join("\n");

  // ── Entrada a EE.UU. ──
  const e1fecha  = bl("fecha que entro a estados unidos");
  const e1lugar  = bl("por que frontera entro a estados unidos");

  // ── Cónyuge ──
  const conjNombre = bl("nombre completo de su esposo(a)") || bl("nombre completo de su esposo");
  const conjDob    = bl("fecha de nacimiento de su esposo(a)");
  const conjPais   = bl("de que pais es su esposo(a)");
  const conjUbic   = bl("donde se encuentra actualmente su esposo");
  const conjAlien  = bl("escriba el numero alien si su esposo");
  const conjNac    = bl("donde nacio su esposo(a)");

  return {
    nombre, apellido,
    alien: bl("numero alien ( si no tiene ponga n/a)") || bl("numero alien"),
    telefono: bl("numero de telefono"),
    direccion: dirRaw,
    sexo,
    dob: bl("fecha de nacimiento"),
    "ciudad-nac": ciudadNac,
    "pais-nac": paisNac,
    nacionalidad: paisNac,
    religion: bl("que religion practica"),
    pasaporte,
    "pasaporte-vence": bl("fecha que vence su pasaporte"),
    "fecha-salida": bl("fecha de ultima vez en su pais"),
    "fecha-entrada": bl("fecha que entro a estados unidos"),
    "e1-lugar": bl("por que frontera entro a estados unidos"),
    "e1-fecha": bl("fecha que entro a estados unidos"),
    q1,
    "estado-civil": estadoCivilEn,
    "tiene-conyuge": tieneConjuge,
    "c-nombre": conjNombre,
    "c-dob": conjDob,
    "c-pais": conjPais,
    "c-ubicacion": conjUbic,
    "c-alien": conjAlien,
    "c-ciudad-nac": conjNac,
    "tiene-hijos": tieneHijos,
    hijos,
    "madre-nombre": madreNombre,
    "madre-nac": madreNac,
    "madre-ubicacion": madreUbicacion,
    "padre-nombre": padreNombre,
    "padre-nac": padreNac,
    "padre-ubicacion": padreUbicacion,
    hermanos,
    educacion,
    empleos,
    residencias,
    "dir-origen": dirOrigen,
    "dir-origen-desde": dirDesde,
    "dir-origen-hasta": dirHasta,
    savedAt: new Date().toISOString(),
    status: "pendiente_revision",
    fuenteJotform: true,
  };
}

// ── PDF I-589 (versión oficial pdf-lib — llena el formulario USCIS real) ─────
window.descargarI589PDF = async function(cliente, oficina, usuario) {
  const d = cliente.i589Draft;
  if(!d){ alert('Este cliente no tiene datos del I-589'); return; }
  if(typeof PDFLib==='undefined'){ alert('Cargando librería PDF, intenta de nuevo en unos segundos'); return; }

  try {
    const P = 'form1[0].#subform[0].';
    const baseUrl = 'https://privas31.github.io/Monitor--Inmigracion/i589-base.pdf';
    const resp = await fetch(baseUrl);
    if(!resp.ok) throw new Error('No se encontró el formulario base i589-base.pdf en el servidor');
    const bytes = await resp.arrayBuffer();
    const pdfDoc = await PDFLib.PDFDocument.load(bytes);
    const form = pdfDoc.getForm();

    const set = (nombre, valor) => {
      if(!valor) return;
      try { const f = form.getTextField(nombre); f.setText(String(valor).slice(0,150)); } catch(e){}
    };
    const setCheck = (nombre) => {
      try { const c = form.getCheckBox(nombre); c.check(); } catch(e){}
    };
    const fmtD = v => { if(!v) return ''; const m=String(v).match(/^(\d{4})-(\d{2})-(\d{2})/); return m? m[2]+'/'+m[3]+'/'+m[1] : String(v); };
    const lineas = v => String(v||'').split(/\r?\n/).map(s=>s.trim()).filter(Boolean);

    // Página 1
    set(P+'PtAILine1_ANumber[0]', d.alien || d.alienNum || cliente.alienNum);
    set(P+'PtAILine4_LastName[0]', d.apellido);
    set(P+'PtAILine5_FirstName[0]', d.nombre);
    set(P+'PtAILine8_StreetNumandName[0]', d.direccion);
    set(P+'PtAILine8_TelephoneNumber[0]', (d.telefono||'').replace(/[^0-9]/g,'').slice(-7));
    if(d.sexo==='M') setCheck(P+'PartALine9Sex[0]');
    else if(d.sexo==='F') setCheck(P+'PartALine9Sex[1]');

    // Página 2 — Cónyuge
    const S = 'form1[0].#subform[1].NotMarried[0].';
    const C2 = 'form1[0].#subform[1].';
    if(d['tiene-conyuge']==='si'){
      set(S+'PtAIILine5_LastName[0]', d['c-apellido']);
      set(S+'PtAIILine6_FirstName[0]', d['c-nombre']);
      set(S+'DateTimeField7[0]', fmtD(d['c-dob']));
      set(S+'TextField10[3]', d['c-ciudad-nac']);
      set(S+'TextField10[4]', d['c-nacionalidad']);
      if(d['c-sexo']==='M') setCheck(S+'CheckBox14_Sex[0]');
      else if(d['c-sexo']==='F') setCheck(S+'CheckBox14_Sex[1]');
    } else if(d['tiene-conyuge']==='no'){
      setCheck(C2+'CheckBox5[0]');
    }

    // Páginas 2-3 — Hijos
    const hijosArr = Array.isArray(d.hijos)? d.hijos : [];
    if(d['tiene-hijos']==='si' && hijosArr.length){
      setCheck(C2+'ChildrenCheckbox[1]');
      set(C2+'TotalChild[0]', String(hijosArr.length));
      const C3='form1[0].#subform[3].';
      const defs=[
        {p:C2,suf:'1',sexo:'CheckBox12_Sex',enusa:'CheckBox17',incY:'PtAIILine21_Yes[0]',incN:'PtAIILine21_No[0]'},
        {p:C3,suf:'2',sexo:'CheckBox26_Sex',enusa:'CheckBox27',incY:'PtAIILine21_Yes2[0]',incN:'PtAIILine21_No2[0]'},
        {p:C3,suf:'3',sexo:'CheckBox36_Sex',enusa:'CheckBox37',incY:'PtAIILine21_Yes3[0]',incN:'PtAIILine21_No3[0]'},
        {p:C3,suf:'4',sexo:'CheckBox46_Sex',enusa:'CheckBox47',incY:'PtAIILine21_Yes4[0]',incN:'PtAIILine21_No4[0]'},
      ];
      hijosArr.slice(0,4).forEach((h,i)=>{
        const c=defs[i];
        set(c.p+'ChildLast'+c.suf+'[0]', h.apellido);
        set(c.p+'ChildFirst'+c.suf+'[0]', h.nombre);
        set(c.p+'ChildDOB'+c.suf+'[0]', fmtD(h.dob));
        set(c.p+'ChildNat'+c.suf+'[0]', h.nac);
        set(c.p+'ChildCity'+c.suf+'[0]', h.ciudad);
        if(h.sexo==='M') setCheck(c.p+c.sexo+'[0]'); else if(h.sexo==='F') setCheck(c.p+c.sexo+'[1]');
      });
    } else if(d['tiene-hijos']==='no'){
      setCheck(C2+'ChildrenCheckbox[0]');
    }

    // Página 4 — Antecedentes
    const Q='form1[0].#subform[4].';
    set(Q+'TextField13[0]', d['dir-origen']);
    set(Q+'DateTimeField21[0]', fmtD(d['dir-origen-desde']));
    set(Q+'DateTimeField22[0]', fmtD(d['dir-origen-hasta']));
    [8,12,16,20,24].forEach((row,i)=>{ const ln=lineas(d.residencias)[i]; if(ln) set(Q+'TextField13['+row+']', ln); });
    [28,31,34,37].forEach((row,i)=>{ const ln=lineas(d.educacion)[i]; if(ln) set(Q+'TextField13['+row+']', ln); });
    [40,42,44].forEach((row,i)=>{ const ln=lineas(d.empleos)[i]; if(ln) set(Q+'TextField13['+row+']', ln); });
    set(Q+'TextField13[46]', d['madre-nombre']);
    set(Q+'TextField13[47]', d['madre-nac']);
    set(Q+'TextField35[0]',  d['madre-ubicacion']);
    set(Q+'TextField13[48]', d['padre-nombre']);
    set(Q+'TextField13[49]', d['padre-nac']);
    set(Q+'TextField35[1]',  d['padre-ubicacion']);
    [50,52,54,56].forEach((row,i)=>{ const ln=lineas(d.hermanos)[i]; if(ln) set(Q+'TextField13['+row+']', ln); });

    // Página 9 — Firma
    const N='form1[0].#subform[10].';
    const nombreCompleto=((d.nombre||'')+' '+(d.apellido||'')).trim();
    set(N+'TextField20[0]', nombreCompleto);
    set(N+'TextField20[1]', nombreCompleto);
    set(N+'DateTimeField48[0]', fmtD(d.savedAt||new Date().toISOString()));
    if(d.firma && String(d.firma).startsWith('data:image/png')){
      try{
        const sigImg = await pdfDoc.embedPng(d.firma);
        const sigField = form.getTextField(N+'TextField22[0]');
        const rect = sigField.acroField.getWidgets()[0].getRectangle();
        const pag9 = pdfDoc.getPage(8);
        const esc = Math.min(rect.width/sigImg.width, rect.height/sigImg.height);
        pag9.drawImage(sigImg, { x: rect.x+(rect.width-sigImg.width*esc)/2, y: rect.y+(rect.height-sigImg.height*esc)/2, width: sigImg.width*esc, height: sigImg.height*esc });
      }catch(e){ console.warn('No se pudo estampar la firma:', e); }
    }

    // Página 9 — Parte E: Preparadora
    if(!oficina) oficina = window._officeData || null;
    if(!usuario) usuario = window._userData || null;
    const prepNombre = (usuario && usuario.displayName) || (oficina && oficina.name) || '';
    const prepDir    = (oficina && oficina.address) || '';
    const prepTel    = ((oficina && oficina.phone) || '').replace(/[^0-9]/g,'');
    if(prepNombre || prepDir || prepTel){
      setCheck(N+'ckboxynd2[0]');
      set(N+'PtE_PreparerName[0]', prepNombre);
      set(N+'PtE_StreetNumAndName[0]', prepDir);
      if(prepTel.length===10){
        set(N+'TextField25[1]', prepTel.slice(0,3));
        set(N+'TextField25[0]', prepTel.slice(3,6)+'-'+prepTel.slice(6));
      } else if(prepTel){
        set(N+'TextField25[0]', prepTel);
      }
    }

    form.flatten();
    const out = await pdfDoc.save();
    const blob = new Blob([out], {type:'application/pdf'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const fname = ((d.nombre||'')+'-'+(d.apellido||'cliente')).replace(/[^a-zA-Z0-9]/g,'-');
    a.href = url; a.download = 'I-589-'+fname+'.pdf';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    if(typeof showToastFn==='function') showToastFn('📥 I-589 oficial descargado','success');
  } catch(e){
    console.error('Error I-589:',e);
    if(typeof showToastFn==='function') showToastFn('Error: '+e.message,'error');
    else alert('Error: '+e.message);
  }
};

// ── PDF I-589 BORRADOR (versión jsPDF — resumen visual) ──────────────────────
window.descargarI589PDFBorrador = function(cliente) {
  const d = cliente.i589Draft;
  if(!d) return;
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit:'mm', format:'letter' });
  const W=215.9, M=14, tW=W-M*2; let y=0;

  const val = (v) => (v && v !== '—' && v.trim()) ? v.trim() : '';
  const line = (label, value, x, yPos, lw=85, vw=85) => {
    pdf.setFontSize(8); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
    pdf.text(label, x, yPos);
    pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42);
    const v = val(value) || '___________________________';
    const lines = pdf.splitTextToSize(v, vw);
    pdf.text(lines, x, yPos+4);
    return yPos + 4 + lines.length*4;
  };

  const box = (x,y,w,h) => { pdf.setDrawColor(180,180,180); pdf.setLineWidth(0.3); pdf.rect(x,y,w,h,'S'); };
  const sectionHeader = (text, yPos) => {
    pdf.setFillColor(15,23,42); pdf.rect(0,yPos,W,8,'F');
    pdf.setTextColor(255,255,255); pdf.setFontSize(9); pdf.setFont('helvetica','bold');
    pdf.text(text, W/2, yPos+5.5, {align:'center'});
    return yPos+10;
  };

  // ── HEADER ────────────────────────────────────────────────────────────────
  pdf.setFillColor(15,23,42); pdf.rect(0,0,W,18,'F');
  pdf.setTextColor(255,255,255); pdf.setFontSize(13); pdf.setFont('helvetica','bold');
  pdf.text('Application for Asylum and for Withholding of Removal', W/2, 8, {align:'center'});
  pdf.setFontSize(9); pdf.setFont('helvetica','normal'); pdf.setTextColor(200,200,200);
  pdf.text('Department of Homeland Security — U.S. Citizenship and Immigration Services', W/2, 13, {align:'center'});
  pdf.setFillColor(30,58,95); pdf.rect(0,18,W,7,'F');
  pdf.setTextColor(255,255,255); pdf.setFontSize(8); pdf.setFont('helvetica','bold');
  pdf.text('USCIS Form I-589  |  OMB No. 1615-0067', M, 23);
  pdf.text('PREPARED BY: ImmigPath Services — immigpath.com', W-M, 23, {align:'right'});
  y=30;

  // Nota
  pdf.setFillColor(254,243,199); pdf.rect(M,y,tW,8,'F');
  pdf.setTextColor(146,64,14); pdf.setFontSize(7.5); pdf.setFont('helvetica','bold');
  pdf.text('⚠ DRAFT — FOR OFFICE REVIEW ONLY. Not for official submission without attorney review and signature.',M+3,y+5);
  y+=12;

  // ── PARTE A.I ─────────────────────────────────────────────────────────────
  y = sectionHeader('PART A.I. — INFORMATION ABOUT YOU', y);

  // Row 1: A#, SSN
  box(M,y,tW/3,12); box(M+tW/3,y,tW/3,12); box(M+tW*2/3,y,tW/3,12);
  pdf.setFontSize(7); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
  pdf.text('1. Alien Registration No. (A#)', M+1, y+3);
  pdf.text('2. U.S. Social Security No.', M+tW/3+1, y+3);
  pdf.text('3. USCIS Online Account No.', M+tW*2/3+1, y+3);
  pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42); pdf.setFontSize(9);
  pdf.text(val(d.alien)||'', M+2, y+9);
  pdf.text(val(d.ssn)||'', M+tW/3+2, y+9);
  y+=14;

  // Row 2: Last name, First name, Middle
  box(M,y,tW/3,12); box(M+tW/3,y,tW/3,12); box(M+tW*2/3,y,tW/3,12);
  pdf.setFontSize(7); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
  pdf.text('4. Complete Last Name', M+1, y+3);
  pdf.text('5. First Name', M+tW/3+1, y+3);
  pdf.text('6. Middle Name', M+tW*2/3+1, y+3);
  pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42); pdf.setFontSize(9);
  pdf.text(val(d.apellido)||'', M+2, y+9);
  pdf.text(val(d.nombre)||'', M+tW/3+2, y+9);
  pdf.text(val(d.middle)||'', M+tW*2/3+2, y+9);
  y+=14;

  // Row 3: Other names
  box(M,y,tW,10);
  pdf.setFontSize(7); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
  pdf.text('7. What other names have you used (include maiden name and aliases)?', M+1, y+3);
  pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42); pdf.setFontSize(9);
  pdf.text(val(d.alias)||'', M+2, y+8);
  y+=12;

  // Row 4: Address
  box(M,y,tW,10);
  pdf.setFontSize(7); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
  pdf.text('8. Residence in the U.S. (Street, City, State, ZIP)', M+1, y+3);
  pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42); pdf.setFontSize(9);
  const addr = [val(d.direccion), val(d.ciudad), val(d.estado), val(d.zip)].filter(Boolean).join(', ');
  pdf.text(addr||'', M+2, y+8);
  y+=12;

  // Row 5: Sex, Marital status, DOB, City/Country of birth
  box(M,y,tW/4,10); box(M+tW/4,y,tW/4,10); box(M+tW/2,y,tW/4,10); box(M+tW*3/4,y,tW/4,10);
  pdf.setFontSize(7); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
  pdf.text('10. Sex', M+1, y+3);
  pdf.text('11. Marital Status', M+tW/4+1, y+3);
  pdf.text('12. Date of Birth', M+tW/2+1, y+3);
  pdf.text('13. City and Country of Birth', M+tW*3/4+1, y+3);
  pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42); pdf.setFontSize(9);
  pdf.text(d.sexo==='M'?'Male':d.sexo==='F'?'Female':'', M+2, y+8);
  pdf.text(val(d['estado-civil'])||'', M+tW/4+2, y+8);
  pdf.text(val(d.dob)||'', M+tW/2+2, y+8);
  pdf.text(val(d['ciudad-nac'])||'', M+tW*3/4+2, y+8);
  y+=12;

  // Row 6: Nationality, Nationality at birth, Race, Religion
  box(M,y,tW/4,10); box(M+tW/4,y,tW/4,10); box(M+tW/2,y,tW/4,10); box(M+tW*3/4,y,tW/4,10);
  pdf.setFontSize(7); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
  pdf.text('14. Present Nationality', M+1, y+3);
  pdf.text('15. Nationality at Birth', M+tW/4+1, y+3);
  pdf.text('16. Race/Ethnic Group', M+tW/2+1, y+3);
  pdf.text('17. Religion', M+tW*3/4+1, y+3);
  pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42); pdf.setFontSize(9);
  pdf.text(val(d.nacionalidad)||'', M+2, y+8);
  pdf.text(val(d['nacionalidad-nac'])||'', M+tW/4+2, y+8);
  pdf.text(val(d.raza)||'', M+tW/2+2, y+8);
  pdf.text(val(d.religion)||'', M+tW*3/4+2, y+8);
  y+=12;

  // Row 7: Immigration Court, Date left country, I-94
  box(M,y,tW/2,10); box(M+tW/2,y,tW/4,10); box(M+tW*3/4,y,tW/4,10);
  pdf.setFontSize(7); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
  pdf.text('18. Immigration Court Proceedings', M+1, y+3);
  pdf.text('19a. Date Last Left Country', M+tW/2+1, y+3);
  pdf.text('19b. I-94 Number', M+tW*3/4+1, y+3);
  pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42); pdf.setFontSize(9);
  pdf.text(val(d['court-status'])||'', M+2, y+8);
  pdf.text(val(d['fecha-salida'])||'', M+tW/2+2, y+8);
  pdf.text(val(d.i94)||'', M+tW*3/4+2, y+8);
  y+=12;

  // Row 8: Entries to US
  box(M,y,tW,10);
  pdf.setFontSize(7); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
  pdf.text('19c. List each entry into the U.S. (Date / Place / Status)', M+1, y+3);
  pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42); pdf.setFontSize(8);
  const e1 = [val(d['e1-fecha']), val(d['e1-lugar']), val(d['e1-estatus'])].filter(Boolean).join(' | ');
  const e2 = [val(d['e2-fecha']), val(d['e2-lugar']), val(d['e2-estatus'])].filter(Boolean).join(' | ');
  pdf.text(e1||'', M+2, y+7);
  if(e2) pdf.text(e2, M+2, y+10);
  y+=14;

  // Row 9: Passport
  box(M,y,tW/3,10); box(M+tW/3,y,tW/3,10); box(M+tW*2/3,y,tW/3,10);
  pdf.setFontSize(7); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
  pdf.text('20. Country Issued Passport', M+1, y+3);
  pdf.text('21. Passport Number', M+tW/3+1, y+3);
  pdf.text('22. Expiration Date', M+tW*2/3+1, y+3);
  pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42); pdf.setFontSize(9);
  pdf.text(val(d['pais-pasaporte'])||'', M+2, y+8);
  pdf.text(val(d.pasaporte)||'', M+tW/3+2, y+8);
  pdf.text(val(d['pasaporte-vence'])||'', M+tW*2/3+2, y+8);
  y+=12;

  // Row 10: Language, English, Other languages
  box(M,y,tW/3,10); box(M+tW/3,y,tW/6,10); box(M+tW/2,y,tW/2,10);
  pdf.setFontSize(7); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
  pdf.text('23. Native Language', M+1, y+3);
  pdf.text('24. English?', M+tW/3+1, y+3);
  pdf.text('25. Other Languages', M+tW/2+1, y+3);
  pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42); pdf.setFontSize(9);
  pdf.text(val(d.idioma)||'', M+2, y+8);
  pdf.text(d.ingles==='si'?'Yes':d.ingles==='no'?'No':'', M+tW/3+2, y+8);
  pdf.text(val(d['otros-idiomas'])||'', M+tW/2+2, y+8);
  y+=14;

  // ── PARTE B — NARRATIVA ───────────────────────────────────────────────────
  pdf.addPage(); y=10;
  y = sectionHeader('PART B — INFORMATION ABOUT YOUR APPLICATION', y);

  // Bases del asilo
  box(M,y,tW,12);
  pdf.setFontSize(7); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
  pdf.text('Basis for asylum claim (check all that apply):', M+1, y+3);
  pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42); pdf.setFontSize(8.5);
  const bases = [
    d['base-raza'] && 'Race',
    d['base-religion'] && 'Religion',
    d['base-nacionalidad'] && 'Nationality',
    d['base-opinion'] && 'Political Opinion',
    d['base-grupo'] && 'Particular Social Group',
    d['base-tortura'] && 'Convention Against Torture',
  ].filter(Boolean);
  pdf.text(bases.length ? bases.join('  ✓  ') : 'Not specified', M+2, y+9);
  y+=14;

  // Preguntas narrativas
  const qs = [
    ['B-A. What happened to you / What do you fear? (Question 1)', d.q1],
    ['B-B. What harm do you fear if you return? (Question 2)', d.q2],
    ['Who threatened or persecuted you? (Question 3)', d.q3],
    ['When did it occur? Specific incidents (Question 4)', d.q4],
    ['Why were you targeted? (Question 5)', d.q5],
    ['Are family members in danger? (Question 6)', d.q6],
  ];

  qs.forEach(([label, resp]) => {
    if(!val(resp)) return;
    const lines = pdf.splitTextToSize(val(resp), tW-4);
    const h = Math.max(14, lines.length*4.5 + 8);
    if(y + h > 270) { pdf.addPage(); y=10; }
    box(M,y,tW,h);
    pdf.setFontSize(7); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
    pdf.text(label, M+1, y+3);
    pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42); pdf.setFontSize(8.5);
    pdf.text(lines, M+2, y+8);
    y += h+2;
  });

  // ── FOOTER en todas las páginas ───────────────────────────────────────────
  const totalPages = pdf.internal.getNumberOfPages();
  for(let i=1; i<=totalPages; i++) {
    pdf.setPage(i);
    pdf.setFillColor(15,23,42); pdf.rect(0,272,W,15,'F');
    pdf.setTextColor(200,200,200); pdf.setFontSize(7.5); pdf.setFont('helvetica','normal');
    pdf.text('Form I-589 — DRAFT PREPARED BY IMMIG PATH SERVICES | immigpath.com | Page '+i+' of '+totalPages, W/2, 278, {align:'center'});
    pdf.setTextColor(150,150,150);
    pdf.text('Client: '+(d.nombre||'')+' '+(d.apellido||'')+'  |  A#: '+(d.alien||'N/A')+'  |  Prepared: '+new Date().toLocaleDateString('en-US'), W/2, 283, {align:'center'});
  }

  const fname = (val(d.apellido)||'client').replace(/[^a-zA-Z0-9]/g,'-');
  pdf.save('I-589-DRAFT-'+fname+'.pdf');
  if(typeof showToastFn === 'function') showToastFn('📥 I-589 PDF descargado', 'success');
};
