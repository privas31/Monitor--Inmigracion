//  Helpers 
function getStatus(f){if(!f)return"pendiente";const h=new Date();h.setHours(0,0,0,0);const d=Math.round((new Date(f+"T00:00:00")-h)/86400000);if(d<0)return"vencido";if(d===0)return"hoy";if(d<=3)return"urgente";if(d<=14)return"proximo";return"ok";}
function getDias(f){if(!f)return null;const h=new Date();h.setHours(0,0,0,0);return Math.round((new Date(f+"T00:00:00")-h)/86400000);}
function fmt(f){if(!f)return"—";const[y,m,d]=f.split("-");return`${m}/${d}/${y}`;}
function fmtA(a){const c=(a||"").replace(/\D/g,"").slice(0,9);if(c.length<=3)return c;if(c.length<=6)return c.slice(0,3)+"-"+c.slice(3);return c.slice(0,3)+"-"+c.slice(3,6)+"-"+c.slice(6);}
function eoirUrl(a){return`https://acis.eoir.justice.gov/en/CaseInformation?caseNumber=${(a||"").replace(/\D/g,"")}`;}
function uscisUrl(r){return`https://egov.uscis.gov/casestatus/mycasestatus.do?appReceiptNum=${(r||"").replace(/\s/g,"")}`;}
function fmtMoney(v){if(!v&&v!==0)return"";const n=parseFloat(v.toString().replace(/[^0-9.]/g,""));if(isNaN(n))return"";return"$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});}
function parseMoney(v){return parseFloat((v||"0").toString().replace(/[^0-9.]/g,""))||0;}
function getPct(total,pagado){if(!total)return null;return Math.min(100,Math.round((pagado/total)*100));}
function pagoColor(pct){if(pct===null)return"#6B7280";if(pct>=100)return"#16A34A";if(pct>=50)return"#D97706";return"#DC2626";}
function getTotalProcesos(procesos){return(procesos||[]).reduce((s,p)=>s+parseMoney(p.precio),0);}
function getTotalPagado(procesos){return(procesos||[]).reduce((s,p)=>s+parseMoney(p.pagado),0);}
function getPróximaFecha(cliente){const fechas=[];(cliente.casos||[]).forEach(c=>{if(c.fechaCorte)fechas.push(c.fechaCorte);if(c.fechaHuellas)fechas.push(c.fechaHuellas);});if(!fechas.length)return null;const hoy=new Date();hoy.setHours(0,0,0,0);const futuras=fechas.filter(f=>new Date(f+"T00:00:00")>=hoy).sort();if(futuras.length)return futuras[0];return fechas.sort().reverse()[0];}
function getStatusCliente(cliente){const pf=getPróximaFecha(cliente);if(!pf)return"pendiente";return getStatus(pf);}

//  Editor de procesos de pago 
function ProcesosEditor({procesos,onChange}){
  const add=()=>onChange([...procesos,{nombre:"",precio:"",pagado:"",notas:"",id:Date.now()}]);
  const upd=(i,f,v)=>{const n=[...procesos];n[i]={...n[i],[f]:v};onChange(n);};
  const del=(i)=>onChange(procesos.filter((_,idx)=>idx!==i));
  const total=getTotalProcesos(procesos);const pagado=getTotalPagado(procesos);const pct=getPct(total,pagado);const pc=pagoColor(pct);
  return(<div style={{background:"#FFFBEB",border:"1px solid #FDE68A",borderRadius:8,padding:"12px",marginBottom:10}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <div style={{fontSize:12,fontWeight:700,color:"#D97706"}}>💰 Pagos de este proceso</div>
      <button onClick={add} style={{background:"#1E40AF",color:"#fff",border:"none",borderRadius:6,padding:"4px 10px",fontSize:11,cursor:"pointer",fontWeight:600}}>+ Agregar pago</button>
    </div>
    {procesos.length===0&&<div style={{fontSize:11,color:"#94A3B8",textAlign:"center",padding:"6px 0"}}>Sin pagos registrados</div>}
    {procesos.map((p,i)=>(
      <div key={p.id||i} style={{background:"#fff",borderRadius:7,padding:"9px 11px",marginBottom:7,border:"1px solid #FDE68A"}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
          <select value={p.nombre} onChange={e=>upd(i,"nombre",e.target.value)} style={{flex:1,padding:"6px 8px",borderRadius:6,border:"1px solid #D1D5DB",fontSize:12,background:"#fff",cursor:"pointer",marginRight:8}}>
            <option value="">Seleccionar proceso...</option>{PROCESOS_COMUNES.map(pc=><option key={pc} value={pc}>{pc}</option>)}
          </select>
          <button onClick={()=>del(i)} style={{background:"#FEF2F2",color:"#EF4444",border:"1px solid #FECACA",borderRadius:6,padding:"4px 8px",fontSize:11,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:6}}>
          <div><label style={{display:"block",fontSize:10,fontWeight:600,color:"#374151",marginBottom:2,textTransform:"uppercase"}}>Precio</label><input value={p.precio} onChange={e=>upd(i,"precio",e.target.value)} placeholder="Ej. 2500" style={{width:"100%",padding:"6px 8px",borderRadius:6,border:"1px solid #D1D5DB",fontSize:12,outline:"none"}}/></div>
          <div><label style={{display:"block",fontSize:10,fontWeight:600,color:"#374151",marginBottom:2,textTransform:"uppercase"}}>Pagado</label><input value={p.pagado} onChange={e=>upd(i,"pagado",e.target.value)} placeholder="Ej. 1000" style={{width:"100%",padding:"6px 8px",borderRadius:6,border:"1px solid #D1D5DB",fontSize:12,outline:"none"}}/></div>
        </div>
        {p.precio&&<><div style={{background:"#E2E8F0",borderRadius:20,height:4}}><div style={{height:"100%",borderRadius:20,background:pagoColor(getPct(parseMoney(p.precio),parseMoney(p.pagado))),width:`${getPct(parseMoney(p.precio),parseMoney(p.pagado))||0}%`}}/></div><div style={{fontSize:10,color:pagoColor(getPct(parseMoney(p.precio),parseMoney(p.pagado))),fontWeight:700,marginTop:2}}>{fmtMoney(p.pagado)||"$0"} / {fmtMoney(p.precio)} — {getPct(parseMoney(p.precio),parseMoney(p.pagado))||0}%</div></>}
        <input value={p.notas||""} onChange={e=>upd(i,"notas",e.target.value)} placeholder="Notas de pago..." style={{width:"100%",padding:"5px 8px",borderRadius:6,border:"1px solid #E2E8F0",fontSize:11,outline:"none",marginTop:6}}/>
      </div>
    ))}

      <div style={{background:"#E2E8F0",borderRadius:20,height:5,marginTop:4}}><div style={{height:"100%",borderRadius:20,background:pc,width:`${pct||0}%`}}/></div>

//  LOGIN 
function LoginScreen({onLogin}){
  const[email,setEmail]=useState("");const[pw,setPw]=useState("");const[err,setErr]=useState("");const[loading,setLoading]=useState(false);
  const[loginLogo,setLoginLogo]=useState(window._officeLogo||null);
  const[loginName,setLoginName]=useState(window._officeName||null);
  useEffect(()=>{
    window._forceLoginUpdate=()=>{setLoginLogo(window._officeLogo||null);setLoginName(window._officeName||null);};
    return()=>{window._forceLoginUpdate=null;};
  },[]);
  const login=async()=>{if(!email||!pw){setErr("Ingresa tu email y contraseña");return;}setLoading(true);setErr("");
    try{
      const{auth,signInWithEmailAndPassword,db,doc,getDoc}=window._firebase;
      const cred=await signInWithEmailAndPassword(auth,email,pw);
      // Monitor personal — no requiere colección users en Firestore
      const userData={role:"office_admin",officeId:"personal",displayName:cred.user.email};
      const officeInfo={id:"personal",name:"Mi Oficina",plan:"professional",enabledModules:["immigration"]};
      onLogin(cred.user,userData,officeInfo);
    }catch(e){setErr("Email o contraseña incorrectos");}setLoading(false);};
  return(<div style={{minHeight:"100vh",background:"linear-gradient(135deg,#0F172A 0%,#1E40AF 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:400,padding:36,boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{marginBottom:12,display:"flex",justifyContent:"center"}}>
          {loginLogo
            ?<img src={loginLogo} alt="Logo" style={{height:70,maxWidth:220,objectFit:"contain",borderRadius:10}}/>
            :<div style={{fontSize:48}}>⚖️</div>
          }
        </div>
        <h1 style={{fontSize:22,fontWeight:800,color:"#0F172A",margin:0}}>{loginName||t("Monitor de Inmigración","Immigration Monitor")}</h1>
        <p style={{fontSize:13,color:"#64748B",marginTop:6}}>{t("Ingresa con tu cuenta para continuar","Sign in to continue")}</p>
      </div>
      <div style={{marginBottom:14}}><label style={{display:"block",fontSize:12,fontWeight:600,color:"#374151",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.04em"}}>{t("Email","Email")}</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="tu@email.com" onKeyDown={e=>e.key==="Enter"&&login()} style={{width:"100%",padding:"11px 13px",borderRadius:8,border:"1px solid #D1D5DB",fontSize:14,outline:"none"}}/></div>
      <div style={{marginBottom:20}}><label style={{display:"block",fontSize:12,fontWeight:600,color:"#374151",marginBottom:5,textTransform:"uppercase",letterSpacing:"0.04em"}}>{t("Contraseña","Password")}</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&login()} style={{width:"100%",padding:"11px 13px",borderRadius:8,border:"1px solid #D1D5DB",fontSize:14,outline:"none"}}/></div>
      {err&&<div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:8,padding:"10px 14px",fontSize:13,color:"#DC2626",marginBottom:16}}>⚠️ {err}</div>}
      <button onClick={login} disabled={loading} style={{width:"100%",padding:"12px",borderRadius:9,border:"none",background:loading?"#E5E7EB":"#1E40AF",color:loading?"#9CA3AF":"#fff",fontSize:15,fontWeight:700,cursor:loading?"not-allowed":"pointer"}}>{loading ? t("Ingresando...","Signing in...") : t("Ingresar →","Sign in →")}</button>
    </div></div>);
}

          if(prevCliente.paisOrigen!==formCliente.paisOrigen) cambios.push({icono:"🌍",texto:`País: ${prevCliente.paisOrigen||"—"} → ${formCliente.paisOrigen||"—"}`});
          // Casos
          const casosNew=formCliente.casos||[];
          const casosOld=prevCliente.casos||[];
          if(casosNew.length>casosOld.length) cambios.push({icono:"📁",texto:`Nuevo caso agregado: ${casosNew[casosNew.length-1].tipoCaso||"Sin tipo"}`});
          if(casosNew.length<casosOld.length) cambios.push({icono:"🗑️",texto:`Caso eliminado`});
          casosNew.forEach((ca,i)=>{
            const prev=casosOld[i]||{};
            const label=ca.tipoCaso||`Caso ${i+1}`;
            if(prev.tipoCaso!==ca.tipoCaso&&ca.tipoCaso) cambios.push({icono:"📋",texto:`Tipo de caso: ${prev.tipoCaso||"—"} → ${ca.tipoCaso}`});
            if(prev.estatusCaso!==ca.estatusCaso&&ca.estatusCaso) cambios.push({icono:"🔄",texto:`[${label}] Estado: ${prev.estatusCaso||"—"} → ${ca.estatusCaso}`});
            if(prev.fechaCorte!==ca.fechaCorte&&ca.fechaCorte) cambios.push({icono:"📅",texto:`[${label}] Fecha de corte: ${fmtFecha(prev.fechaCorte)} → ${fmtFecha(ca.fechaCorte)}`});
            if(prev.fechaHuellas!==ca.fechaHuellas&&ca.fechaHuellas) cambios.push({icono:"📅",texto:`[${label}] Biométricos: ${fmtFecha(prev.fechaHuellas)} → ${fmtFecha(ca.fechaHuellas)}`});
            if(prev.fechaAsilo!==ca.fechaAsilo&&ca.fechaAsilo) cambios.push({icono:"📅",texto:`[${label}] Fecha asilo: ${fmtFecha(prev.fechaAsilo)} → ${fmtFecha(ca.fechaAsilo)}`});
            if(prev.receiptNum!==ca.receiptNum&&ca.receiptNum) cambios.push({icono:"🧾",texto:`[${label}] N° Recibo: ${prev.receiptNum||"—"} → ${ca.receiptNum}`});
            if(prev.alienNum!==ca.alienNum&&ca.alienNum) cambios.push({icono:"🪪",texto:`[${label}] A#: ${prev.alienNum||"—"} → ${ca.alienNum}`});
            if(prev.foiaTracking!==ca.foiaTracking&&ca.foiaTracking) cambios.push({icono:"📂",texto:`[${label}] FOIA Tracking: ${prev.foiaTracking||"—"} → ${ca.foiaTracking}`});
            if(prev.foiaEstado!==ca.foiaEstado&&ca.foiaEstado) cambios.push({icono:"📂",texto:`[${label}] Estado FOIA: ${prev.foiaEstado||"—"} → ${ca.foiaEstado}`});
            if(prev.nota!==ca.nota&&ca.nota) cambios.push({icono:"📝",texto:`[${label}] Notas actualizadas`});
            // Pagos/procesos
            const procNew=ca.procesos||[];
            const procOld=prev.procesos||[];
            if(procNew.length>procOld.length) cambios.push({icono:"💵",texto:`[${label}] Nuevo pago agregado: ${procNew[procNew.length-1].nombre||""}`});
            procNew.forEach((p,pi)=>{
              const pp=procOld[pi]||{};
              if(pp.pagado!==p.pagado&&p.pagado) cambios.push({icono:"💵",texto:`[${label}] Pago "${p.nombre||"—"}": $${pp.pagado||0} → $${p.pagado}`});
            });
          });
          if(cambios.length>0){
            await addDoc(collection(db,"historial"),{
              clienteId:editId,officeId,
              cambios,
              accion:cambios.map(c=>c.texto).join(" · "),
              usuario,
              usuarioEmail:user.email,
              fecha:new Date().toISOString(),
            });

            if(showHistorial&&historialCliente?.id===editId){
              const q=query(collection(db,"historial"),where("clienteId","==",editId),orderBy("fecha","desc"));
              const snap=await getDocs(q);
              setHistorialData(snap.docs.map(d=>({id:d.id,...d.data()})));
            }
          }

        setClientes(prev=>prev.map(c=>c.id===editId?{...c,...formCliente,officeId}:c));
        showToastFn("Cliente actualizado ✓");
      }else{
        //  MULTI-OFFICE: always save officeId 
        const encargadaAuto = formCliente.encargada || userData?.displayName || user.email || "";
        const ref=await addDoc(collection(db,"clientes"),{...formCliente,officeId,encargada:encargadaAuto,createdAt:new Date().toISOString(),createdBy:user.email});
        try{await addDoc(collection(db,"historial"),{clienteId:ref.id,officeId,accion:"Cliente registrado",usuario:user.email,fecha:new Date().toISOString()});}catch(he){console.error(he);}
        setClientes(prev=>[{id:ref.id,...formCliente,officeId,encargada:encargadaAuto,createdAt:new Date().toISOString()},...prev]);
        showToastFn("Cliente agregado ✓");
      }
    }catch(e){console.error("Error al guardar:",e);showToastFn("Error al guardar: "+e.message,"error");}
    setSaving(false);setShowModal(false);
  };

    const alertas1dia=alertas.filter(c=>{const pf=getPróximaFecha(c);return getDias(pf)===0||getDias(pf)===1;});
    const alertas3dias=alertas.filter(c=>{const pf=getPróximaFecha(c);const d=getDias(pf);return d>1&&d<=3;});
    const alertas7dias=alertas.filter(c=>{const pf=getPróximaFecha(c);const d=getDias(pf);return d>3&&d<=7;});
    const vencidos=clientes.filter(c=>getStatusCliente(c)==="vencido");
    const totalCobrar=clientes.reduce((s,c)=>(c.casos||[]).reduce((s2,ca)=>s2+getTotalProcesos(ca.procesos||[]),s),0);
    const totalCobrado=clientes.reduce((s,c)=>(c.casos||[]).reduce((s2,ca)=>s2+getTotalPagado(ca.procesos||[]),s),0);
    const pendiente=totalCobrar-totalCobrado;
    const eadElegibles=clientes.filter(c=>(c.casos||[]).some(ca=>{if(!ca.fechaAsilo)return false;const dias=Math.floor((hoy-new Date(ca.fechaAsilo+"T00:00:00"))/86400000);return dias>=180;}));
    const eadPróximos=clientes.filter(c=>(c.casos||[]).some(ca=>{if(!ca.fechaAsilo)return false;const dias=Math.floor((hoy-new Date(ca.fechaAsilo+"T00:00:00"))/86400000);return dias>=160&&dias<180;}));
    const pagadoCompleto=clientes.filter(c=>{const t=(c.casos||[]).reduce((s,ca)=>s+getTotalProcesos(ca.procesos||[]),0);const p=(c.casos||[]).reduce((s,ca)=>s+getTotalPagado(ca.procesos||[]),0);return t>0&&p>=t;});
    const conSaldo=clientes.filter(c=>{const t=(c.casos||[]).reduce((s,ca)=>s+getTotalProcesos(ca.procesos||[]),0);const p=(c.casos||[]).reduce((s,ca)=>s+getTotalPagado(ca.procesos||[]),0);return t>0&&p<t;});
    const sinPago=clientes.filter(c=>{const t=(c.casos||[]).reduce((s,ca)=>s+getTotalProcesos(ca.procesos||[]),0);const p=(c.casos||[]).reduce((s,ca)=>s+getTotalPagado(ca.procesos||[]),0);return t>0&&p===0;});
    const sinFecha=clientes.filter(c=>!getPróximaFecha(c)&&(c.casos||[]).length>0);

    return{alertas,alertas1dia,alertas3dias,alertas7dias,vencidos,totalCobrar,totalCobrado,pendiente,eadElegibles,eadPróximos,pagadoCompleto,conSaldo,sinPago,sinFecha,sinDocumentos};

  const generatePDF=()=>{

    const pdfdoc=new jsPDF({orientation:"landscape",unit:"mm",format:"a4"});

                  //  Helper: limpiar texto para jsPDF 
                  const cleanTxt = s => { if(!s) return ""; let r=""; for(let i=0;i<s.length;i++){const c=s.charCodeAt(i);if(c>=32&&c<=126)r+=s[i];} return r.trim(); };
                  const W2 = 297; const M = 10;

                  //  HEADER 
                  // Banda superior azul marino
                  pdfdoc.setFillColor(30,58,95);
                  pdfdoc.rect(0,0,W2,26,"F");

                  pdfdoc.text(fechaPDF + "   |   " + datos.length + " clientes   |   " + cleanTxt(user.email), M, 17);
                  // Badge Confidencial derecha
                  pdfdoc.setFillColor(255,255,255);
                  pdfdoc.setFillColor(255,255,255,0.12);
                  pdfdoc.setDrawColor(255,255,255,0.25);
                  pdfdoc.roundedRect(W2-M-30, 7, 28, 7, 1.5, 1.5, "FD");
                  pdfdoc.setTextColor(203,216,232);
                  pdfdoc.setFontSize(6.5);
                  pdfdoc.text("Confidencial", W2-M-29, 12);

                  //  TABLA 
                  // (estado removido del PDF  no se muestra)

                  const rows3=[];
                  datos.forEach(c=>{
                    const st=getStatusCliente(c);
                    const pf=getPróximaFecha(c);
                    const dias=pf?getDias(pf):null;
                    const totalP=(c.casos||[]).reduce((s,ca)=>s+getTotalProcesos(ca.procesos||[]),0);
                    const pagadoP=(c.casos||[]).reduce((s,ca)=>s+getTotalPagado(ca.procesos||[]),0);
                    const pct=getPct(totalP,pagadoP);
                    // Sistemas: texto limpio deduplicado, separado por "  "
                    const TIPO_SHORT={"I-485 Ajuste de estatus":"Ajuste","I-130 Peticion familiar":"I-130","I-765 Permiso de trabajo":"W.P.","I-131 Advance Parole":"A.P.","N-400 Naturalizacion":"N-400","I-589 Asilo":"Asilo","I-90 Renovar Green Card":"I-90","Asilo":"Asilo","Deportacion":"Deportacion","Cancelación":"Cancelación","Ajuste de estatus":"Ajuste","Apelacion":"Apelacion","FOIA - Expediente migratorio":"FOIA","FOIA - Expediente USCIS":"FOIA","FOIA - Expediente ICE":"FOIA","FOIA - Expediente CBP":"FOIA","Otro":"Otro"};
                    const sistemasUnicos=[...new Set((c.casos||[]).map(ca=>(ca.sistema||"").toUpperCase()).filter(Boolean))];
                    const tiposUnicos=[...new Set((c.casos||[]).map(ca=>{const t=cleanTxt(ca.tipoCaso||"");return TIPO_SHORT[t]||t.split(" ")[0]||"";}).filter(Boolean))];
                    const sistemasStr=[...sistemasUnicos,...tiposUnicos].join(" · ");
                    // Tiempo legible
                    let tiempoStr="—";
                    if(dias!==null){
                      if(dias<0) tiempoStr="Hace "+Math.abs(dias)+"d";
                      else if(dias===0) tiempoStr="Hoy";
                      else tiempoStr="+"+dias+"d";
                    }
                    // Fecha de ingreso del cliente al sistema
                    const fechaIngreso=c.createdAt?new Date(c.createdAt).toLocaleDateString("en-US",{month:"2-digit",day:"2-digit",year:"numeric"}):"—";
                    // Pais en una sola linea (max 12 chars)
                    const paisStr=cleanTxt(c.paisOrigen)||"—";
                    // Alien num sin guiones partidos
                    const alienStr=fmtA(c.alienNum)||"—";
                    rows3.push({
                      row:[
                        cleanTxt(c.nombre)||"—",
                        paisStr,
                        alienStr,
                        sistemasStr,
                        fechaIngreso,
                        cleanTxt(c.encargada)||"—",
                        totalP?fmtMoney(totalP):"—",
                        pagadoP?fmtMoney(pagadoP):"—",
                      ],
                      status:st
                    });
                  });

                  pdfdoc.autoTable({
                    startY: 30,
                    head:[["Nombre","Pais","Num. Alien","Sistemas","Ingreso","Encargada","Total","Pagado"]],
                    body: rows3.map(r=>r.row),
                    styles:{
                      fontSize: 7.5,
                      cellPadding: [3,4],
                      overflow: "linebreak",
                      valign: "middle",
                      textColor: [30,41,59],
                      lineColor: [226,232,240],
                      lineWidth: 0.1
                    },
                    headStyles:{
                      fillColor: [30,58,95],
                      textColor: [255,255,255],
                      fontStyle: "bold",
                      fontSize: 7.5,
                      cellPadding: [4,4],
                      lineWidth: 0
                    },
                    alternateRowStyles:{
                      fillColor: [248,250,252]
                    },
                    columnStyles:{
                      0:{cellWidth:40, fontStyle:"bold"},
                      1:{cellWidth:22},
                      2:{cellWidth:26, fontSize:7.5},
                      3:{cellWidth:68},
                      4:{cellWidth:22, halign:"center"},
                      5:{cellWidth:32},
                      6:{cellWidth:22, halign:"right"},
                      7:{cellWidth:22, halign:"right"},
                    },
                    didParseCell:(data)=>{
                      if(data.section==="body" && data.column.index===0){
                        data.cell.styles.textColor=[30,58,95];
                        data.cell.styles.fontStyle="bold";
                      }
                    },
                    margin:{left:M, right:M},
                    tableLineColor:[226,232,240],
                    tableLineWidth:0.1
                  });

                  //  FOOTER 
                  const pcPDF=pdfdoc.internal.getNumberOfPages();
                  for(let i=1;i<=pcPDF;i++){
                    pdfdoc.setPage(i);
                    const pH=pdfdoc.internal.pageSize.height;
                    pdfdoc.setDrawColor(226,232,240);
                    pdfdoc.setLineWidth(0.3);
                    pdfdoc.line(M, pH-8, W2-M, pH-8);

                    pdfdoc.setFont("helvetica","normal");
                    pdfdoc.text("CONFIDENCIAL — Solo para uso interno  |  "+cleanTxt(officeData?.name||"Mi Monitor")+"  |  Pag "+i+" de "+pcPDF, M, pH-3.5);
                  }

    pdfdoc.save("reporte-"+new Date().toISOString().slice(0,10)+".pdf");
    setShowPDF(false);
    showToastFn("PDF: "+datos.length+" clientes");
  };

// ── PDF I-589 ────────────────────────────────────────────────────────────────
window.descargarI589PDF = function(cliente) {
  const d = cliente.i589Draft;
  if(!d) return;
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit:'mm', format:'letter' });
  const W=215.9, M=14, tW=W-M*2; let y=0;

  const val = (v) => (v && v !== '—' && v.trim()) ? v.trim() : '';
  const line = (label, value, x, yPos, lw=85, vw=85) => {
    pdf.setFontSize(8); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
    pdf.text(label, x, yPos);
    pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42);
    const v = val(value) || '___________________________';
    const lines = pdf.splitTextToSize(v, vw);
    pdf.text(lines, x, yPos+4);
    return yPos + 4 + lines.length*4;
  };

  const box = (x,y,w,h) => { pdf.setDrawColor(180,180,180); pdf.setLineWidth(0.3); pdf.rect(x,y,w,h,'S'); };
  const sectionHeader = (text, yPos) => {
    pdf.setFillColor(15,23,42); pdf.rect(0,yPos,W,8,'F');
    pdf.setTextColor(255,255,255); pdf.setFontSize(9); pdf.setFont('helvetica','bold');
    pdf.text(text, W/2, yPos+5.5, {align:'center'});
    return yPos+10;
  };

  // ── HEADER ────────────────────────────────────────────────────────────────
  pdf.setFillColor(15,23,42); pdf.rect(0,0,W,18,'F');
  pdf.setTextColor(255,255,255); pdf.setFontSize(13); pdf.setFont('helvetica','bold');
  pdf.text('Application for Asylum and for Withholding of Removal', W/2, 8, {align:'center'});
  pdf.setFontSize(9); pdf.setFont('helvetica','normal'); pdf.setTextColor(200,200,200);
  pdf.text('Department of Homeland Security — U.S. Citizenship and Immigration Services', W/2, 13, {align:'center'});
  pdf.setFillColor(30,58,95); pdf.rect(0,18,W,7,'F');
  pdf.setTextColor(255,255,255); pdf.setFontSize(8); pdf.setFont('helvetica','bold');
  pdf.text('USCIS Form I-589  |  OMB No. 1615-0067', M, 23);
  pdf.text('PREPARED BY: ImmigPath Services — immigpath.com', W-M, 23, {align:'right'});
  y=30;

  // Nota
  pdf.setFillColor(254,243,199); pdf.rect(M,y,tW,8,'F');
  pdf.setTextColor(146,64,14); pdf.setFontSize(7.5); pdf.setFont('helvetica','bold');
  pdf.text('⚠ DRAFT — FOR OFFICE REVIEW ONLY. Not for official submission without attorney review and signature.',M+3,y+5);
  y+=12;

  // ── PARTE A.I ─────────────────────────────────────────────────────────────
  y = sectionHeader('PART A.I. — INFORMATION ABOUT YOU', y);

  // Row 1: A#, SSN
  box(M,y,tW/3,12); box(M+tW/3,y,tW/3,12); box(M+tW*2/3,y,tW/3,12);
  pdf.setFontSize(7); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
  pdf.text('1. Alien Registration No. (A#)', M+1, y+3);
  pdf.text('2. U.S. Social Security No.', M+tW/3+1, y+3);
  pdf.text('3. USCIS Online Account No.', M+tW*2/3+1, y+3);
  pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42); pdf.setFontSize(9);
  pdf.text(val(d.alien)||'', M+2, y+9);
  pdf.text(val(d.ssn)||'', M+tW/3+2, y+9);
  y+=14;

  // Row 2: Last name, First name, Middle
  box(M,y,tW/3,12); box(M+tW/3,y,tW/3,12); box(M+tW*2/3,y,tW/3,12);
  pdf.setFontSize(7); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
  pdf.text('4. Complete Last Name', M+1, y+3);
  pdf.text('5. First Name', M+tW/3+1, y+3);
  pdf.text('6. Middle Name', M+tW*2/3+1, y+3);
  pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42); pdf.setFontSize(9);
  pdf.text(val(d.apellido)||'', M+2, y+9);
  pdf.text(val(d.nombre)||'', M+tW/3+2, y+9);
  pdf.text(val(d.middle)||'', M+tW*2/3+2, y+9);
  y+=14;

  // Row 3: Other names
  box(M,y,tW,10);
  pdf.setFontSize(7); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
  pdf.text('7. What other names have you used (include maiden name and aliases)?', M+1, y+3);
  pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42); pdf.setFontSize(9);
  pdf.text(val(d.alias)||'', M+2, y+8);
  y+=12;

  // Row 4: Address
  box(M,y,tW,10);
  pdf.setFontSize(7); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
  pdf.text('8. Residence in the U.S. (Street, City, State, ZIP)', M+1, y+3);
  pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42); pdf.setFontSize(9);
  const addr = [val(d.direccion), val(d.ciudad), val(d.estado), val(d.zip)].filter(Boolean).join(', ');
  pdf.text(addr||'', M+2, y+8);
  y+=12;

  // Row 5: Sex, Marital status, DOB, City/Country of birth
  box(M,y,tW/4,10); box(M+tW/4,y,tW/4,10); box(M+tW/2,y,tW/4,10); box(M+tW*3/4,y,tW/4,10);
  pdf.setFontSize(7); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
  pdf.text('10. Sex', M+1, y+3);
  pdf.text('11. Marital Status', M+tW/4+1, y+3);
  pdf.text('12. Date of Birth', M+tW/2+1, y+3);
  pdf.text('13. City and Country of Birth', M+tW*3/4+1, y+3);
  pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42); pdf.setFontSize(9);
  pdf.text(d.sexo==='M'?'Male':d.sexo==='F'?'Female':'', M+2, y+8);
  pdf.text(val(d['estado-civil'])||'', M+tW/4+2, y+8);
  pdf.text(val(d.dob)||'', M+tW/2+2, y+8);
  pdf.text(val(d['ciudad-nac'])||'', M+tW*3/4+2, y+8);
  y+=12;

  // Row 6: Nationality, Nationality at birth, Race, Religion
  box(M,y,tW/4,10); box(M+tW/4,y,tW/4,10); box(M+tW/2,y,tW/4,10); box(M+tW*3/4,y,tW/4,10);
  pdf.setFontSize(7); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
  pdf.text('14. Present Nationality', M+1, y+3);
  pdf.text('15. Nationality at Birth', M+tW/4+1, y+3);
  pdf.text('16. Race/Ethnic Group', M+tW/2+1, y+3);
  pdf.text('17. Religion', M+tW*3/4+1, y+3);
  pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42); pdf.setFontSize(9);
  pdf.text(val(d.nacionalidad)||'', M+2, y+8);
  pdf.text(val(d['nacionalidad-nac'])||'', M+tW/4+2, y+8);
  pdf.text(val(d.raza)||'', M+tW/2+2, y+8);
  pdf.text(val(d.religion)||'', M+tW*3/4+2, y+8);
  y+=12;

  // Row 7: Immigration Court, Date left country, I-94
  box(M,y,tW/2,10); box(M+tW/2,y,tW/4,10); box(M+tW*3/4,y,tW/4,10);
  pdf.setFontSize(7); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
  pdf.text('18. Immigration Court Proceedings', M+1, y+3);
  pdf.text('19a. Date Last Left Country', M+tW/2+1, y+3);
  pdf.text('19b. I-94 Number', M+tW*3/4+1, y+3);
  pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42); pdf.setFontSize(9);
  pdf.text(val(d['court-status'])||'', M+2, y+8);
  pdf.text(val(d['fecha-salida'])||'', M+tW/2+2, y+8);
  pdf.text(val(d.i94)||'', M+tW*3/4+2, y+8);
  y+=12;

  // Row 8: Entries to US
  box(M,y,tW,10);
  pdf.setFontSize(7); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
  pdf.text('19c. List each entry into the U.S. (Date / Place / Status)', M+1, y+3);
  pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42); pdf.setFontSize(8);
  const e1 = [val(d['e1-fecha']), val(d['e1-lugar']), val(d['e1-estatus'])].filter(Boolean).join(' | ');
  const e2 = [val(d['e2-fecha']), val(d['e2-lugar']), val(d['e2-estatus'])].filter(Boolean).join(' | ');
  pdf.text(e1||'', M+2, y+7);
  if(e2) pdf.text(e2, M+2, y+10);
  y+=14;

  // Row 9: Passport
  box(M,y,tW/3,10); box(M+tW/3,y,tW/3,10); box(M+tW*2/3,y,tW/3,10);
  pdf.setFontSize(7); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
  pdf.text('20. Country Issued Passport', M+1, y+3);
  pdf.text('21. Passport Number', M+tW/3+1, y+3);
  pdf.text('22. Expiration Date', M+tW*2/3+1, y+3);
  pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42); pdf.setFontSize(9);
  pdf.text(val(d['pais-pasaporte'])||'', M+2, y+8);
  pdf.text(val(d.pasaporte)||'', M+tW/3+2, y+8);
  pdf.text(val(d['pasaporte-vence'])||'', M+tW*2/3+2, y+8);
  y+=12;

  // Row 10: Language, English, Other languages
  box(M,y,tW/3,10); box(M+tW/3,y,tW/6,10); box(M+tW/2,y,tW/2,10);
  pdf.setFontSize(7); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
  pdf.text('23. Native Language', M+1, y+3);
  pdf.text('24. English?', M+tW/3+1, y+3);
  pdf.text('25. Other Languages', M+tW/2+1, y+3);
  pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42); pdf.setFontSize(9);
  pdf.text(val(d.idioma)||'', M+2, y+8);
  pdf.text(d.ingles==='si'?'Yes':d.ingles==='no'?'No':'', M+tW/3+2, y+8);
  pdf.text(val(d['otros-idiomas'])||'', M+tW/2+2, y+8);
  y+=14;

  // ── PARTE B — NARRATIVA ───────────────────────────────────────────────────
  pdf.addPage(); y=10;
  y = sectionHeader('PART B — INFORMATION ABOUT YOUR APPLICATION', y);

  // Bases del asilo
  box(M,y,tW,12);
  pdf.setFontSize(7); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
  pdf.text('Basis for asylum claim (check all that apply):', M+1, y+3);
  pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42); pdf.setFontSize(8.5);
  const bases = [
    d['base-raza'] && 'Race',
    d['base-religion'] && 'Religion',
    d['base-nacionalidad'] && 'Nationality',
    d['base-opinion'] && 'Political Opinion',
    d['base-grupo'] && 'Particular Social Group',
    d['base-tortura'] && 'Convention Against Torture',
  ].filter(Boolean);
  pdf.text(bases.length ? bases.join('  ✓  ') : 'Not specified', M+2, y+9);
  y+=14;

  // Preguntas narrativas
  const qs = [
    ['B-A. What happened to you / What do you fear? (Question 1)', d.q1],
    ['B-B. What harm do you fear if you return? (Question 2)', d.q2],

    ['Why were you targeted? (Question 5)', d.q5],
    ['Are family members in danger? (Question 6)', d.q6],
  ];

  qs.forEach(([label, resp]) => {
    if(!val(resp)) return;
    const lines = pdf.splitTextToSize(val(resp), tW-4);
    const h = Math.max(14, lines.length*4.5 + 8);
    if(y + h > 270) { pdf.addPage(); y=10; }
    box(M,y,tW,h);
    pdf.setFontSize(7); pdf.setFont('helvetica','bold'); pdf.setTextColor(100,116,139);
    pdf.text(label, M+1, y+3);
    pdf.setFont('helvetica','normal'); pdf.setTextColor(15,23,42); pdf.setFontSize(8.5);
    pdf.text(lines, M+2, y+8);
    y += h+2;

  // ── FOOTER en todas las páginas ───────────────────────────────────────────
  const totalPages = pdf.internal.getNumberOfPages();
  for(let i=1; i<=totalPages; i++) {
    pdf.setPage(i);
